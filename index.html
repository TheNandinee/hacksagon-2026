<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARANYA | Autonomous Real-time Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-primary: #1f6f5c;
            --green-accent: #2ecc71;
            --cyan-highlight: #7fe7dc;
            --black: #000000;
            --green-dim: #16a085;
            --green-muted: #0e4d3a;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: var(--black);
            font-family: 'Courier New', monospace;
            color: var(--green-accent);
            scroll-behavior: smooth;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Vignette Effect */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.65) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Scanlines Effect */
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: repeating-linear-gradient(
                0deg,
                rgba(31, 111, 92, 0.025),
                rgba(31, 111, 92, 0.025) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 3;
            pointer-events: none;
            animation: scanlineShift 8s linear infinite;
        }

        @keyframes scanlineShift {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        #scroll-content {
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* Each scene is 2× viewport so scroll lingers */
        .scroll-section {
            width: 100%;
            height: 200vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Sticky inner so content stays pinned while scrolling through the section */
        .sticky-inner {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content-box {
            text-align: center;
            max-width: 1000px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            width: 100%;
        }

        /* Terminal-style text glow — softer with new palette */
        .glow-text {
            text-shadow: 0 0 8px var(--green-accent), 0 0 18px var(--green-primary), 0 0 28px var(--green-muted);
            color: var(--cyan-highlight);
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        h1.aranya-title {
            font-size: 7rem;
            letter-spacing: 0.5em;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) scale(0.8);
            margin: 0 10px;
            font-size: 1em;
            color: var(--cyan-highlight);
            text-shadow: 0 0 5px var(--green-accent), 0 0 10px var(--green-primary);
        }

        .letter.active {
            animation: letterDrop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes letterDrop {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.8);
                text-shadow: 0 0 5px var(--green-accent), 0 0 10px var(--green-primary);
            }
            50% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
                text-shadow: 0 0 12px var(--cyan-highlight), 0 0 22px var(--green-accent), 0 0 32px var(--green-primary);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                text-shadow: 0 0 8px var(--green-accent), 0 0 18px var(--green-primary);
            }
        }

        .subtitle {
            font-size: 0.95rem;
            letter-spacing: 0.28em;
            margin-top: 2.5rem;
            font-weight: 300;
            color: var(--green-dim);
            text-transform: uppercase;
            line-height: 2.2;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .word {
            display: inline-block;
            opacity: 0;
            margin: 0 3px;
        }

        .problem-text {
            font-size: 1.75rem;
            line-height: 2;
            font-weight: 400;
            font-style: italic;
            color: var(--cyan-highlight);
            max-width: 900px;
            margin: 0 auto;
            text-shadow: 0 0 8px var(--green-primary), 0 0 18px var(--green-muted);
            font-family: 'Courier New', monospace;
        }

        .cta-button {
            pointer-events: all;
            padding: 16px 45px;
            font-size: 1.1rem;
            background: transparent;
            color: var(--green-accent);
            border: 2px solid var(--green-primary);
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 40px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 8px var(--green-primary);
            box-shadow: inset 0 0 10px rgba(31, 111, 92, 0.15);
        }

        .cta-button:hover {
            background: rgba(31, 111, 92, 0.15);
            color: var(--cyan-highlight);
            border-color: var(--green-accent);
            box-shadow: 0 0 18px var(--green-primary), inset 0 0 10px rgba(46, 204, 113, 0.15);
            transform: scale(1.05);
        }

        #scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--green-dim);
            animation: pulse 2.5s infinite;
            text-shadow: 0 0 8px var(--green-primary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.35; transform: translateX(-50%) translateY(0); }
            50% { opacity: 0.85; transform: translateX(-50%) translateY(5px); }
        }

        #data-marker {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            transform: translate(-50%, -50%);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }

        .marker-ring {
            width: 100%;
            height: 100%;
            border: 2px solid var(--green-accent);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
            box-shadow: 0 0 12px var(--green-primary);
        }

        @keyframes pulse-ring {
            0%  { transform: scale(1);   opacity: 1; }
            100%{ transform: scale(1.6); opacity: 0; }
        }

        .marker-dot {
            width: 8px;
            height: 8px;
            background: var(--cyan-highlight);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--green-accent);
        }

        /* Scene 1 and 2 are spacers — no content */
        #scene1, #scene2 { height: 200vh; }

        /* Scene 3 needs extra real-estate so text has time to finish */
        #scene3 { height: 300vh; }
        #scene4 { height: 200vh; }
        #scene5 { height: 200vh; }

        /* trailing spacer */
        .spacer { height: 50vh; }

        /* CTA heading */
        .cta-heading {
            font-size: 2.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--cyan-highlight);
            text-shadow: 0 0 8px var(--green-primary);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.12em;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="vignette"></div>
    <div id="scanlines"></div>
    <div id="data-marker">
        <div class="marker-ring"></div>
        <div class="marker-dot"></div>
    </div>
    <div id="scroll-hint">▼ Scroll to explore ▼</div>

    <div id="scroll-content">
        <!-- Scene 1: The Hook (spacer) -->
        <div id="scene1"></div>

        <!-- Scene 2: The Zoom (spacer) -->
        <div id="scene2"></div>

        <!-- Scene 3: The Reveal — sticky so content stays centred during scroll -->
        <div id="scene3">
            <div class="sticky-inner">
                <div class="content-box" id="reveal-box">
                    <h1 class="aranya-title glow-text">
                        <span class="letter">A</span><span class="letter">R</span><span class="letter">A</span><span class="letter">N</span><span class="letter">Y</span><span class="letter">A</span>
                    </h1>
                    <div class="subtitle">
                        <span class="word">Autonomous</span>
                        <span class="word">·</span>
                        <span class="word">Real-time</span>
                        <span class="word">·</span>
                        <span class="word">Analytics</span>
                        <span class="word">·</span>
                        <span class="word">for</span>
                        <span class="word">·</span>
                        <span class="word">Natural</span>
                        <span class="word">·</span>
                        <span class="word">Yield</span>
                        <span class="word">·</span>
                        <span class="word">Area</span>
                        <span class="word">·</span>
                        <span class="word">Protection</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene 4: The Problem Statement -->
        <div id="scene4">
            <div class="sticky-inner">
                <div class="content-box" id="problem-box">
                    <p class="problem-text">
                        "The Aravali hills — 2 billion years old — are disappearing.<br>
                        We built a system to catch who's doing it."
                    </p>
                </div>
            </div>
        </div>

        <!-- Scene 5: The CTA -->
        <div id="scene5">
            <div class="sticky-inner">
                <div class="content-box" id="cta-box">
                    <h2 class="cta-heading">PROTECT THE ARAVALI</h2>
                    <a href="http://localhost:8501" class="cta-button">→ ENTER ARANYA ←</a>
                </div>
            </div>
        </div>

        <div class="spacer"></div>
    </div>

    <script>
        // ==================== THREE.JS SETUP ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        // ==================== TEXTURES ====================
        const textureLoader = new THREE.TextureLoader();
        const earthTexture  = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormal   = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // ==================== EARTH GROUP ====================
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthGeo = new THREE.SphereGeometry(1, 128, 128);
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTexture,
            normalMap: earthNormal,
            specularMap: earthSpecular,
            specular: new THREE.Color(0x222222),
            shininess: 20,
            emissive: new THREE.Color(0x111111)
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        const cloudGeo = new THREE.SphereGeometry(1.018, 128, 128);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: cloudsTexture,
            transparent: true,
            opacity: 0.55,
            emissive: new THREE.Color(0x080808)
        });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        earthGroup.add(cloudMesh);

        // Atmosphere layers — new palette (forest green / deep teal)
        const atmosGeo1 = new THREE.SphereGeometry(1.025, 128, 128);
        const atmosMat1 = new THREE.MeshBasicMaterial({
            color: 0x1f6f5c,
            transparent: true,
            opacity: 0.07,
            side: THREE.BackSide
        });
        earthGroup.add(new THREE.Mesh(atmosGeo1, atmosMat1));

        const atmosGeo2 = new THREE.SphereGeometry(1.06, 128, 128);
        const atmosMat2 = new THREE.MeshBasicMaterial({
            color: 0x2ecc71,
            transparent: true,
            opacity: 0.09,
            side: THREE.BackSide
        });
        earthGroup.add(new THREE.Mesh(atmosGeo2, atmosMat2));

        const atmosGeo3 = new THREE.SphereGeometry(1.12, 128, 128);
        const atmosMat3 = new THREE.MeshBasicMaterial({
            color: 0x0e4d3a,
            transparent: true,
            opacity: 0.05,
            side: THREE.BackSide
        });
        earthGroup.add(new THREE.Mesh(atmosGeo3, atmosMat3));

        // ==================== STARFIELD ====================
        function createNebula(count, size, range, color) {
            const geo = new THREE.BufferGeometry();
            const coords = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) coords[i] = (Math.random() - 0.5) * range;
            geo.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            const mat = new THREE.PointsMaterial({ color, size, transparent: true, opacity: 0.55, sizeAttenuation: true });
            return new THREE.Points(geo, mat);
        }

        const starField1 = createNebula(3000, 0.05, 150, 0xffffff);
        const starField2 = createNebula(1200, 0.07, 200, 0x7fe7dc);  // cyan-highlight
        const starField3 = createNebula(700,  0.10, 250, 0x2ecc71);  // accent
        scene.add(starField1, starField2, starField3);

        // ==================== LIGHTING ====================
        scene.add(new THREE.AmbientLight(0x303030, 2.5));

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.8);
        sunLight.position.set(8, 4, 8);
        scene.add(sunLight);

        const rimLight = new THREE.DirectionalLight(0x1f6f5c, 0.7);
        rimLight.position.set(-5, -2, -8);
        scene.add(rimLight);

        // ==================== CAMERA ====================
        camera.position.z = 5;
        earthGroup.rotation.y = -Math.PI / 2.5;
        earthGroup.rotation.x = 0.3;

        // ==================== RENDER LOOP ====================
        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.0001;
            cloudMesh.rotation.y  += 0.00015;
            starField1.rotation.y += 0.00005;
            starField2.rotation.y += 0.00003;
            starField3.rotation.y += 0.00002;
            renderer.render(scene, camera);
        }
        animate();

        // ==================== GSAP SCROLL ====================
        gsap.registerPlugin(ScrollTrigger);

        /*
         * Total scroll height (approximate vh units):
         *   scene1  200vh
         *   scene2  200vh
         *   scene3  300vh  ← extra room for title+subtitle reveal
         *   scene4  200vh
         *   scene5  200vh
         *   spacer   50vh
         * = ~1150vh total
         *
         * scrub: 3 keeps transitions smooth and deliberate.
         * Timeline positions (0–1) are mapped to that full scroll distance.
         *
         * Scene boundaries (fraction of total):
         *   scene1 ends  ≈ 0.174  (200/1150)
         *   scene2 ends  ≈ 0.348  (400/1150)
         *   scene3 ends  ≈ 0.609  (700/1150)
         *   scene4 ends  ≈ 0.783  (900/1150)
         *   scene5 ends  ≈ 0.957  (1100/1150)
         */

        const masterTL = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 3,
                markers: false
            }
        });

        // ── SCENE 1 → 2: Zoom in toward Aravali ───────────────────────────
        // Runs from 0 → 0.35 of the scroll

        masterTL.to(camera.position, {
            z: 1.2,
            ease: "power2.inOut",
            duration: 0.18
        }, 0);

        masterTL.to(earthGroup.rotation, {
            y: Math.PI * 0.42,
            x: 0.5,
            ease: "power2.inOut",
            duration: 0.18
        }, 0);

        masterTL.to(camera.position, {
            z: 0.52,
            ease: "power2.inOut",
            duration: 0.18
        }, 0.14);

        // Data marker appears as we lock onto the region
        masterTL.to("#data-marker", {
            opacity: 1,
            duration: 0.06
        }, 0.26);

        // ── SCENE 3: Reveal box fades in, then letters fire ───────────────
        // Starts at ~0.34 (just as scene3 enters) — well before scene3 midpoint

        masterTL.to("#reveal-box", {
            opacity: 1,
            duration: 0.04
        }, 0.34);

        const letters = document.querySelectorAll('.letter');
        letters.forEach((letter, i) => {
            const pos = 0.36 + i * 0.022;   // stagger each letter
            masterTL.call(() => { letter.classList.add('active'); }, [], pos);
        });

        // Subtitle words after letters finish (last letter fires at ~0.36+5×0.022=0.47)
        const words = document.querySelectorAll('.word');
        words.forEach((word, i) => {
            masterTL.to(word, {
                opacity: 1,
                duration: 0.012
            }, 0.49 + i * 0.009);
        });
        // Last word lands at 0.49 + 12×0.009 = 0.598 → well inside scene3

        // ── SCENE 3 → 4: Reveal fades out, problem appears ───────────────
        masterTL.to("#reveal-box", {
            opacity: 0,
            y: -80,
            filter: "blur(12px)",
            duration: 0.06
        }, 0.63);

        masterTL.to("#data-marker", {
            opacity: 0,
            duration: 0.04
        }, 0.63);

        masterTL.to("#problem-box", {
            opacity: 1,
            duration: 0.07
        }, 0.69);

        // Camera eases back slightly for problem statement
        masterTL.to(camera.position, {
            z: 0.72,
            ease: "power2.inOut",
            duration: 0.10
        }, 0.63);

        // ── SCENE 4 → 5: Problem fades, CTA rises ────────────────────────
        masterTL.to("#problem-box", {
            opacity: 0,
            y: -70,
            filter: "blur(10px)",
            duration: 0.06
        }, 0.80);

        masterTL.to("#cta-box", {
            opacity: 1,
            duration: 0.08
        }, 0.86);

        // Final zoom for drama
        masterTL.to(camera.position, {
            z: 0.42,
            ease: "power2.inOut",
            duration: 0.10
        }, 0.86);

        // ── Hide scroll hint once user starts scrolling ───────────────────
        ScrollTrigger.create({
            trigger: "#scroll-content",
            start: "top+=50 top",
            onEnter: () => gsap.to("#scroll-hint", { opacity: 0, duration: 0.5 })
        });

        // ==================== RESIZE ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            ScrollTrigger.refresh();
        });
    </script>
</body>
</html>
