<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARANYA | Autonomous Real-time Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: #00ff88;
            scroll-behavior: smooth;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Vignette Effect */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Scanlines Effect */
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 136, 0.03),
                rgba(0, 255, 136, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 3;
            pointer-events: none;
            animation: scanlineShift 8s linear infinite;
        }

        @keyframes scanlineShift {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        #scroll-content {
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .scroll-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .content-box {
            text-align: center;
            max-width: 1000px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
        }

        /* Terminal-style text glow */
        .glow-text {
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        h1.aranya-title {
            font-size: 7rem;
            letter-spacing: 0.5em;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            font-family: 'Courier New', monospace;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) scale(0.8);
            margin: 0 12px;
            font-size: 1em;
            text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88;
        }

        .letter.active {
            animation: letterDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes letterDrop {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.8);
                text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88;
            }
            50% {
                opacity: 1;
                transform: translateY(-10px) scale(1.1);
                text-shadow: 0 0 15px #00ff88, 0 0 25px #00ff88, 0 0 35px #00ff88;
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            }
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.3em;
            margin-top: 2.5rem;
            font-weight: 300;
            color: #00cc66;
            text-transform: uppercase;
            line-height: 2;
            font-family: 'Courier New', monospace;
        }

        .word {
            display: inline-block;
            opacity: 0;
            margin: 0 4px;
        }

        .problem-text {
            font-size: 1.8rem;
            line-height: 2;
            font-weight: 400;
            font-style: italic;
            color: #00ff88;
            max-width: 1000px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            font-family: 'Courier New', monospace;
        }

        .cta-button {
            pointer-events: all;
            padding: 16px 45px;
            font-size: 1.1rem;
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 40px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ff88;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .cta-button:hover {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 20px #00ff88, inset 0 0 10px rgba(0, 255, 136, 0.2);
            transform: scale(1.05);
        }

        #scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #00ff88;
            animation: pulse 2.5s infinite;
            text-shadow: 0 0 10px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(5px); }
        }

        #data-marker {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            transform: translate(-50%, -50%);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }

        .marker-ring {
            width: 100%;
            height: 100%;
            border: 2px solid #00ff88;
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
            box-shadow: 0 0 15px #00ff88;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .marker-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ff88;
        }

        .spacer {
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="vignette"></div>
    <div id="scanlines"></div>
    <div id="data-marker">
        <div class="marker-ring"></div>
        <div class="marker-dot"></div>
    </div>
    <div id="scroll-hint">▼ Scroll to explore ▼</div>

    <div id="scroll-content">
        <!-- Scene 1: The Hook -->
        <div class="scroll-section" id="scene1"></div>

        <!-- Scene 2: The Zoom -->
        <div class="scroll-section" id="scene2"></div>

        <!-- Scene 3: The Reveal -->
        <div class="scroll-section" id="scene3">
            <div class="content-box" id="reveal-box">
                <h1 class="aranya-title glow-text">
                    <span class="letter">A</span><span class="letter">R</span><span class="letter">A</span><span class="letter">N</span><span class="letter">Y</span><span class="letter">A</span>
                </h1>
                <div class="subtitle">
                    <span class="word">Autonomous</span>
                    <span class="word">·</span>
                    <span class="word">Real-time</span>
                    <span class="word">·</span>
                    <span class="word">Analytics</span>
                    <span class="word">·</span>
                    <span class="word">for</span>
                    <span class="word">·</span>
                    <span class="word">Natural</span>
                    <span class="word">·</span>
                    <span class="word">Yield</span>
                    <span class="word">·</span>
                    <span class="word">Area</span>
                    <span class="word">·</span>
                    <span class="word">Protection</span>
                </div>
            </div>
        </div>

        <!-- Scene 4: The Problem Statement -->
        <div class="scroll-section" id="scene4">
            <div class="content-box" id="problem-box">
                <p class="problem-text">
                    "The Aravali hills — 2 billion years old — are disappearing.<br>
                    We built a system to catch who's doing it."
                </p>
            </div>
        </div>

        <!-- Scene 5: The CTA -->
        <div class="scroll-section" id="scene5">
            <div class="content-box" id="cta-box">
                <h2 style="font-size: 2.2rem; font-weight: 700; margin-bottom: 20px; color: #00ff88; text-shadow: 0 0 10px #00ff88; font-family: 'Courier New', monospace;">PROTECT THE ARAVALI</h2>
                <a href="http://localhost:8501" class="cta-button">→ ENTER ARANYA ←</a>
            </div>
        </div>

        <!-- Extra spacer for scroll room -->
        <div class="spacer"></div>
    </div>

    <script>
        // ==================== THREE.JS SETUP ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        // ==================== CUSTOM SHADERS ====================
        const vertexShader = `
            varying vec3 vertexNormal;
            void main() {
                vertexNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D texture;
            uniform sampler2D normalMap;
            uniform vec3 lightPos;
            varying vec3 vertexNormal;
            void main() {
                vec3 normal = normalize(vertexNormal);
                vec3 lightDir = normalize(lightPos);
                float diff = max(dot(normal, lightDir), 0.0);
                gl_FragColor = texture2D(texture, vUv) * (0.5 + diff * 0.5);
            }
        `;

        // ==================== TEXTURES ====================
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormal = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // ==================== EARTH GROUP ====================
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Earth Sphere with enhanced material
        const earthGeo = new THREE.SphereGeometry(1, 128, 128);
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTexture,
            normalMap: earthNormal,
            specularMap: earthSpecular,
            specular: new THREE.Color(0x333333),
            shininess: 25,
            emissive: new THREE.Color(0x1a1a1a)
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        // Clouds Sphere
        const cloudGeo = new THREE.SphereGeometry(1.018, 128, 128);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: cloudsTexture,
            transparent: true,
            opacity: 0.6,
            emissive: new THREE.Color(0x0a0a0a)
        });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        earthGroup.add(cloudMesh);

        // Atmosphere Glow (Inner bright layer)
        const atmosGeo1 = new THREE.SphereGeometry(1.025, 128, 128);
        const atmosMat1 = new THREE.MeshBasicMaterial({
            color: 0x00ff88,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const atmosMesh1 = new THREE.Mesh(atmosGeo1, atmosMat1);
        earthGroup.add(atmosMesh1);

        // Atmosphere Glow (Middle layer)
        const atmosGeo2 = new THREE.SphereGeometry(1.06, 128, 128);
        const atmosMat2 = new THREE.MeshBasicMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const atmosMesh2 = new THREE.Mesh(atmosGeo2, atmosMat2);
        earthGroup.add(atmosMesh2);

        // Atmosphere Glow (Outer halo)
        const atmosGeo3 = new THREE.SphereGeometry(1.12, 128, 128);
        const atmosMat3 = new THREE.MeshBasicMaterial({
            color: 0x2244aa,
            transparent: true,
            opacity: 0.06,
            side: THREE.BackSide
        });
        const atmosMesh3 = new THREE.Mesh(atmosGeo3, atmosMat3);
        earthGroup.add(atmosMesh3);

        // ==================== ENHANCED STARFIELD ====================
        function createNebula(count, size, range, color) {
            const geo = new THREE.BufferGeometry();
            const coords = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                coords[i] = (Math.random() - 0.5) * range;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            const mat = new THREE.PointsMaterial({ 
                color: color,
                size: size, 
                transparent: true, 
                opacity: 0.6,
                sizeAttenuation: true
            });
            return new THREE.Points(geo, mat);
        }

        const starField1 = createNebula(3000, 0.05, 150, 0xffffff);
        const starField2 = createNebula(1500, 0.08, 200, 0x00ff88);
        const starField3 = createNebula(800, 0.12, 250, 0x4488ff);
        scene.add(starField1);
        scene.add(starField2);
        scene.add(starField3);

        // ==================== LIGHTING ====================
        const ambientLight = new THREE.AmbientLight(0x404040, 2.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(8, 4, 8);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Rim light for atmosphere
        const rimLight = new THREE.DirectionalLight(0x00ff88, 0.8);
        rimLight.position.set(-5, -2, -8);
        scene.add(rimLight);

        // ==================== CAMERA INITIAL STATE ====================
        camera.position.z = 5;
        earthGroup.rotation.y = -Math.PI / 2.5;
        earthGroup.rotation.x = 0.3;

        // ==================== ANIMATION LOOP ====================
        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.0001;
            cloudMesh.rotation.y += 0.00015;
            starField1.rotation.y += 0.00005;
            starField2.rotation.y += 0.00003;
            starField3.rotation.y += 0.00002;
            renderer.render(scene, camera);
        }
        animate();

        // ==================== GSAP SCROLL ANIMATIONS ====================
        gsap.registerPlugin(ScrollTrigger);

        const masterTL = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 2.5,
                markers: false
            }
        });

        // SCENE 1-2: Multi-stage zoom to Aravali
        // Stage 1: Zoom to India
        masterTL.to(camera.position, {
            z: 1.2,
            ease: "power2.inOut",
            duration: 1
        }, 0);

        masterTL.to(earthGroup.rotation, {
            y: Math.PI * 0.42,
            x: 0.5,
            ease: "power2.inOut",
            duration: 1
        }, 0);

        // Stage 2: Zoom deeper to Aravali region
        masterTL.to(camera.position, {
            z: 0.5,
            ease: "power2.inOut",
            duration: 1
        }, 0.5);

        // Show data marker at Aravali
        masterTL.to("#data-marker", {
            opacity: 1,
            duration: 0.5
        }, 0.7);

        // Atmosphere intensifies
        masterTL.to([atmosMat1, atmosMat2, atmosMat3], {
            opacity: (i) => [0.15, 0.2, 0.1][i],
            duration: 0.8
        }, 0.3);

        // SCENE 3: The Reveal (Letters drop one by one)
        masterTL.to("#reveal-box", {
            opacity: 1,
            duration: 0.3
        }, 0.6);

        const letters = document.querySelectorAll('.letter');
        letters.forEach((letter, i) => {
            const delay = 0.8 + (i * 0.15);
            masterTL.call(() => {
                letter.classList.add('active');
            }, [], delay);
        });

        // Subtitle fades in after letters
        const words = document.querySelectorAll('.word');
        words.forEach((word, i) => {
            masterTL.to(word, {
                opacity: 1,
                duration: 0.1
            }, 1.7 + (i * 0.04));
        });

        // SCENE 4: Problem Statement
        masterTL.to("#reveal-box", {
            opacity: 0,
            y: -100,
            filter: "blur(15px)",
            duration: 0.5
        }, 2.1);

        masterTL.to("#data-marker", {
            opacity: 0,
            duration: 0.3
        }, 2.1);

        masterTL.to("#problem-box", {
            opacity: 1,
            duration: 0.6
        }, 2.4);

        // Camera pulls back slightly
        masterTL.to(camera.position, {
            z: 0.7,
            ease: "power2.inOut",
            duration: 0.8
        }, 2.1);

        // SCENE 5: CTA Button
        masterTL.to("#problem-box", {
            opacity: 0,
            y: -80,
            filter: "blur(12px)",
            duration: 0.5
        }, 3.0);

        masterTL.to("#cta-box", {
            opacity: 1,
            y: 0,
            duration: 0.6
        }, 3.4);

        masterTL.to(camera.position, {
            z: 0.4,
            ease: "power2.inOut",
            duration: 0.8
        }, 3.4);

        // ==================== HANDLE RESIZE ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            ScrollTrigger.refresh();
        });

    </script>
</body>
</html>
