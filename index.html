<head>

<style>
/* ═══════════════════════════════════════════
   GLOBAL RESET
═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

/* ═══════════════════════════════════════════
   CINEMATIC OVERLAY
═══════════════════════════════════════════ */
#cinematic-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #000;
  overflow-y: auto;
  overflow-x: hidden;
  transition: opacity 1.2s ease, visibility 1.2s ease;
}
#cinematic-overlay.fade-out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Three.js canvas — fixed behind scroll content */
#three-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* Vignette + scanlines */
#vignette {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.6) 100%);
}
#scanlines {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,255,136,0.025), rgba(0,255,136,0.025) 1px, transparent 1px, transparent 2px);
  animation: scanShift 8s linear infinite;
}
@keyframes scanShift { 0%{transform:translateY(0)} 100%{transform:translateY(10px)} }

/* HUD top-right */
#hud {
  position: fixed; top: 1.5rem; right: 1.5rem; z-index: 20;
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  color: rgba(0,255,136,0.5); letter-spacing: 0.1em;
  opacity: 0; transition: opacity 0.8s; line-height: 2;
  text-align: right;
}

/* Data marker ping */
#data-marker {
  position: fixed; top: 50%; left: 50%;
  width: 60px; height: 60px;
  transform: translate(-50%, -50%);
  z-index: 5; opacity: 0; pointer-events: none;
}
.marker-ring {
  width: 100%; height: 100%;
  border: 2px solid #00ff88; border-radius: 50%;
  animation: pulseRing 2s infinite; box-shadow: 0 0 15px #00ff88;
}
@keyframes pulseRing { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.5);opacity:0} }
.marker-dot {
  width: 8px; height: 8px; background: #00ff88; border-radius: 50%;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  box-shadow: 0 0 10px #00ff88;
}

/* Scroll content sits above canvas */
#scroll-content {
  position: relative; z-index: 10; width: 100%;
}
.scroll-section {
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}

/* ARANYA title */
.aranya-title {
  font-size: clamp(4rem, 10vw, 7rem);
  letter-spacing: 0.45em; font-weight: 900;
  font-family: 'Space Mono', monospace;
  color: #00ff88; line-height: 1.2;
  text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
}
.letter {
  display: inline-block; opacity: 0;
  transform: translateY(40px) scale(0.8); margin: 0 8px;
}
.letter.active { animation: letterDrop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes letterDrop {
  0%  { opacity:0; transform:translateY(40px) scale(0.8); text-shadow:0 0 5px #00ff88; }
  50% { opacity:1; transform:translateY(-8px) scale(1.1); text-shadow:0 0 30px #00ff88, 0 0 60px #00ff88; }
  100%{ opacity:1; transform:translateY(0) scale(1); text-shadow:0 0 10px #00ff88, 0 0 20px #00ff88; }
}

.subtitle {
  font-size: clamp(0.6rem, 1.1vw, 0.85rem);
  letter-spacing: 0.25em; margin-top: 2rem;
  font-weight: 400; color: rgba(0,255,136,0.7);
  text-transform: uppercase; line-height: 2;
  font-family: 'Space Mono', monospace;
}
.word { display: inline-block; opacity: 0; margin: 0 3px; }

.problem-box { text-align: center; max-width: 900px; padding: 40px; opacity: 0; }
.problem-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.3rem, 2.8vw, 2rem);
  font-style: italic; font-weight: 300; color: #fff;
  line-height: 1.8; letter-spacing: 0.02em;
}

.cta-box { text-align: center; opacity: 0; }
.cta-title {
  font-family: 'Space Mono', monospace;
  font-size: clamp(1rem, 2vw, 1.4rem);
  color: #00ff88; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 2rem;
  text-shadow: 0 0 10px #00ff88;
}
.cta-button {
  padding: 18px 52px; font-size: 1rem;
  background: transparent; color: #00ff88;
  border: 2px solid #00ff88; cursor: pointer;
  transition: all 0.3s ease; text-decoration: none;
  display: inline-block; letter-spacing: 0.2em;
  text-transform: uppercase; font-weight: 700;
  font-family: 'Space Mono', monospace;
  text-shadow: 0 0 10px #00ff88;
  box-shadow: inset 0 0 10px rgba(0,255,136,0.1);
}
.cta-button:hover {
  background: rgba(0,255,136,0.1);
  box-shadow: 0 0 30px #00ff88, inset 0 0 15px rgba(0,255,136,0.15);
  transform: scale(1.03);
}

#scroll-hint {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%); z-index: 15;
  font-size: 0.65rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: #00ff88;
  animation: scrollPulse 2.5s infinite;
  font-family: 'Space Mono', monospace;
  text-shadow: 0 0 8px #00ff88;
}
@keyframes scrollPulse {
  0%,100%{opacity:0.3;transform:translateX(-50%) translateY(0)}
  50%{opacity:1;transform:translateX(-50%) translateY(5px)}
}

/* ═══════════════════════════════════════════
   REACT APP (hidden until intro completes)
═══════════════════════════════════════════ */
#app-root {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0; transition: opacity 1s ease 0.3s;
  overflow: hidden;
}
#app-root.visible {
  opacity: 1;
  position: relative;
  overflow: auto;
}

/* ═══════════════════════════════════════════
   REACT APP STYLES (from file 2)
═══════════════════════════════════════════ */
body { font-family: 'Inter', sans-serif; overflow-x: hidden; background: #000; color: white; }
.glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
.glass-dark { background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
.scan-line { background: linear-gradient(to bottom, transparent, rgba(34,197,94,0.5), transparent); height: 100px; width: 100%; position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
@keyframes scan { from{top:-100px} to{top:100%} }
.grid-bg { background-image: radial-gradient(rgba(34,197,94,0.15) 1px, transparent 1px); background-size: 30px 30px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
@keyframes notif-slide { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.notif-enter { animation: notif-slide 0.3s ease; }
select option { background: #1a1a1a; color: white; }
.mono { font-family: 'Space Mono', monospace; }
@keyframes pulse-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(2.5);opacity:0} }
@keyframes data-flow { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes count-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes slide-in-right { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes fade-in-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes waveform { 0%,100%{height:4px} 50%{height:28px} }
@keyframes float-up { 0%{opacity:0;transform:translateY(0)} 50%{opacity:1} 100%{opacity:0;transform:translateY(-60px)} }
@keyframes highlight-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0.15)} }
.sim-stage { animation: fade-in-up 0.5s ease forwards; }
.flow-arrow { animation: data-flow 1.5s linear infinite; stroke-dasharray: 8 4; }
.ping-ring::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:2px solid #22c55e; animation:pulse-ring 2s ease-out infinite; }
.terminal-cursor::after { content:'|'; animation:blink 1s step-end infinite; color:#22c55e; }
.shimmer-bar { background: linear-gradient(90deg, rgba(34,197,94,0.1) 25%, rgba(34,197,94,0.3) 50%, rgba(34,197,94,0.1) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     REACT APP (mounts immediately, hidden)
═══════════════════════════════════════════ -->
<div id="app-root"></div>

<!-- ═══════════════════════════════════════════
     CINEMATIC OVERLAY
═══════════════════════════════════════════ -->
<div id="cinematic-overlay">
  <div id="three-canvas"></div>
  <div id="vignette"></div>
  <div id="scanlines"></div>
  <div id="hud">
    <div id="hud-lat">28.6139° N</div>
    <div id="hud-lon">77.2090° E</div>
    <div id="hud-alt">ALT <span id="alt-val">35,786</span> KM</div>

  <div id="scroll-content">

    <div class="scroll-section" id="scene2"></div>

    <!-- Scene 3: Letter reveal -->
    <div class="scroll-section" id="scene3">
      <div id="reveal-box" style="text-align:center;opacity:0;padding:40px">

          <span class="word">Autonomous</span> <span class="word">·</span>

<!-- ═══════════════════════════════════════════
     THREE.JS — CINEMATIC EARTH
═══════════════════════════════════════════ -->
<script>
(function() {
  const container = document.getElementById('three-canvas');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  container.appendChild(renderer.domElement);

  const tl = new THREE.TextureLoader();
  const earthTex  = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
  const earthNorm = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
  const earthSpec = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
  const cloudTex  = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

  const earthGroup = new THREE.Group();
  scene.add(earthGroup);

  const earthMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1, 128, 128),
    new THREE.MeshPhongMaterial({ map:earthTex, normalMap:earthNorm, specularMap:earthSpec, specular:new THREE.Color(0x333333), shininess:25, emissive:new THREE.Color(0x111111) })
  );
  earthGroup.add(earthMesh);

  const cloudMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.018, 128, 128),
    new THREE.MeshPhongMaterial({ map:cloudTex, transparent:true, opacity:0.55 })
  );
  earthGroup.add(cloudMesh);

  // Atmosphere layers
  [[1.03, 0x00ff88, 0.07], [1.065, 0x4488ff, 0.10], [1.12, 0x2244aa, 0.05]].forEach(([r, col, op]) => {
    earthGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(r, 64, 64),
      new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:op, side:THREE.BackSide })
    ));
  });

  // Stars
  function makeStars(count, size, range, col) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * range;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({ color:col, size, transparent:true, opacity:0.7, sizeAttenuation:true }));
  }
  const s1 = makeStars(3000, 0.05, 150, 0xffffff);
  const s2 = makeStars(1200, 0.08, 200, 0x88ffcc);
  const s3 = makeStars(600,  0.12, 250, 0x4488ff);
  scene.add(s1); scene.add(s2); scene.add(s3);

  // Lights
  scene.add(new THREE.AmbientLight(0x404040, 2.5));
  const sun = new THREE.DirectionalLight(0xffffff, 3);
  sun.position.set(8, 4, 8);
  scene.add(sun);
  const rim = new THREE.DirectionalLight(0x00ff88, 0.6);
  rim.position.set(-5, -2, -8);
  scene.add(rim);

  // Initial camera & earth orientation (tilted so India faces us when zoomed)
  camera.position.z = 5;
  earthGroup.rotation.y = -Math.PI / 2.5;
  earthGroup.rotation.x = 0.28;

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    earthGroup.rotation.y += 0.00008;
    cloudMesh.rotation.y  += 0.00012;
    s1.rotation.y += 0.00004;
    s2.rotation.y += 0.00003;
    renderer.render(scene, camera);
  }
  animate();

  // GSAP scroll-driven story
  gsap.registerPlugin(ScrollTrigger);

  const master = gsap.timeline({
    scrollTrigger: {
      trigger: '#scroll-content',
      start: 'top top',
      end: 'bottom bottom',
      scrub: 2.5
    }
  });

  // Scene 1→2: zoom toward India/Aravali region
  master.to(camera.position, { z: 1.15, ease: 'power2.inOut', duration: 1 }, 0);
  master.to(earthGroup.rotation, { y: Math.PI * 0.44, x: 0.48, ease: 'power2.inOut', duration: 1 }, 0);
  master.to(camera.position, { z: 0.48, ease: 'power2.inOut', duration: 0.8 }, 0.55);
  master.to('#data-marker', { opacity: 1, duration: 0.4 }, 0.75);
  master.to('#hud', { opacity: 1, duration: 0.5 }, 0.6);

  // Scene 3: letters
  master.to('#reveal-box', { opacity: 1, duration: 0.3 }, 0.65);
  document.querySelectorAll('.letter').forEach((l, i) => {
    master.call(() => l.classList.add('active'), [], 0.8 + i * 0.14);
  });
  document.querySelectorAll('.word').forEach((w, i) => {
    master.to(w, { opacity: 1, duration: 0.1 }, 1.75 + i * 0.04);
  });

  // Scene 4: problem
  master.to('#reveal-box', { opacity: 0, y: -80, filter: 'blur(12px)', duration: 0.4 }, 2.1);
  master.to('#data-marker', { opacity: 0, duration: 0.3 }, 2.1);
  master.to('#problem-box', { opacity: 1, duration: 0.6 }, 2.4);
  master.to(camera.position, { z: 0.72, ease: 'power2.inOut', duration: 0.7 }, 2.1);

  // Scene 5: CTA
  master.to('#problem-box', { opacity: 0, y: -60, filter: 'blur(10px)', duration: 0.4 }, 3.05);
  master.to('#cta-box', { opacity: 1, duration: 0.6 }, 3.4);
  master.to(camera.position, { z: 0.38, ease: 'power2.inOut', duration: 0.7 }, 3.4);
  master.to('#scroll-hint', { opacity: 0, duration: 0.3 }, 0.15);

  // HUD counter effect (cosmetic)
  let hudTick = setInterval(() => {
    const el = document.getElementById('alt-val');
    if (!el) { clearInterval(hudTick); return; }
    const cur = parseInt(el.textContent.replace(/,/g,'')) || 35786;
    const next = Math.max(1, Math.round(cur * 0.992));
    el.textContent = next.toLocaleString();
    if (next <= 2) clearInterval(hudTick);
  }, 120);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    ScrollTrigger.refresh();
  });
})();

// Called when Enter ARANYA is clicked
function enterApp() {
  const overlay = document.getElementById('cinematic-overlay');
  const appRoot = document.getElementById('app-root');
  overlay.classList.add('fade-out');
  setTimeout(() => {
    overlay.style.display = 'none';
    appRoot.classList.add('visible');
    document.body.style.overflow = 'auto';
  }, 1300);
}
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

const LucideIcon = ({ name, className="w-5 h-5", size, color, strokeWidth }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ elements:[el], attrs:{ class:className, ...(size&&{width:size,height:size}), ...(color&&{stroke:color}), ...(strokeWidth&&{'stroke-width':strokeWidth}) }, nameAttr:'data-lucide' });
    }
  }, [name, className, size, color, strokeWidth]);
  return <span ref={ref} className="inline-flex items-center justify-center shrink-0"></span>;
};

// ── DATA ─────────────────────────────────────────────────────────
let _counter = 3;
const genId = () => `REP-2024-${String(++_counter).padStart(3,'0')}`;
const INITIAL_REPORTS = [
  { id:"REP-2024-001", topic:"Illegal Granite Mining", coords:"28.618° N, 76.234° E", lat:28.62, lng:76.23, status:"Under Investigation", risk:88, loss:"12.4%", date:"2024-05-12", citizen:"Ramesh K.", description:"Heavy machinery observed moving toward the protected forest zone at 2 AM daily. Ground water contaminated.", zone:"Aravalli Zone C — Charkhi Dadri", violationType:"Mining" },
  { id:"REP-2024-002", topic:"Forest Encroachment", coords:"28.575° N, 76.198° E", lat:28.58, lng:76.20, status:"Under Review", risk:64, loss:"4.2%", date:"2024-05-14", citizen:"Anita S.", description:"Fencing appearing around common grazing lands near the reserve border. Lease exceeds permitted area.", zone:"Aravalli Zone B — Pichopa Kalan", violationType:"Encroachment" },
];
const VIOLATION_TYPES = ["Mining","Encroachment","Logging","Poaching","Industrial Waste","Water Contamination"];
const ZONES = ["Aravalli Zone A — Bhiwani","Aravalli Zone B — Pichopa Kalan","Aravalli Zone C — Charkhi Dadri","Aravalli Zone D — Mahendergarh","Rajawas Protected Forest","Dadam Mining Belt","Delhi Ridge Zone"];
const STATUSES = ["Pending Review","Under Review","Under Investigation","Resolved","Closed"];

// ── NOTIFICATIONS ─────────────────────────────────────────────────
const NotifCtx = createContext(null);
const useNotify = () => useContext(NotifCtx);
const NotificationProvider = ({ children }) => {
  const [notifs, setNotifs] = useState([]);
  const notify = useCallback((msg, type='info') => {
    const id = Date.now();
    setNotifs(p => [...p, { id, msg, type }]);
    setTimeout(() => setNotifs(p => p.filter(n => n.id !== id)), 4000);
  }, []);
  return (
    <NotifCtx.Provider value={notify}>
      {children}
      <div style={{position:'fixed',top:76,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8,width:320}}>
        {notifs.map(n => (
          <div key={n.id} className="notif-enter glass-dark rounded-xl px-4 py-3 flex items-center gap-3 text-sm"
            style={{borderLeft:`3px solid ${n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6'}`}}>
            <span style={{color:n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6',fontWeight:700}}>{n.type==='success'?'✓':n.type==='error'?'✕':'ℹ'}</span>
            <span className="text-slate-200 flex-1">{n.msg}</span>
          </div>
        ))}
      </div>
    </NotifCtx.Provider>

const SimulationScreen = ({ onComplete }) => {
  const [stage, setStage] = useState(0);
  const [autoplay, setAutoplay] = useState(true);
  const [introPhase, setIntroPhase] = useState(true);
  const [bootLines, setBootLines] = useState([]);
  const stageData = PIPELINE_STAGES[stage];

  const BOOT_SEQUENCE = [
    '> Initializing A.R.A.N.Y.A Geospatial Core...',
    '> Loading Sentinel-2 data connectors... OK',
    '> Mounting protected zone shapefiles... OK',
    '> Establishing Weather API stream... OK',
    '> Calibrating Change-Detection Transformer... OK',
    '> Risk Emission Model loaded... OK',
    '> Compliance Intelligence Engine online... OK',
    '████████████████████ SYSTEM READY',
  ];

  useEffect(() => {
    if (!introPhase) return;
    let i = 0;
    const t = setInterval(() => {
      if (i < BOOT_SEQUENCE.length) setBootLines(p => [...p, BOOT_SEQUENCE[i]]);
      i++;
      if (i >= BOOT_SEQUENCE.length) { clearInterval(t); setTimeout(() => setIntroPhase(false), 800); }
    }, 320);
    return () => clearInterval(t);
  }, [introPhase]);

  useEffect(() => {
    if (introPhase || !autoplay) return;
    const t = setInterval(() => {
      setStage(s => { if (s >= PIPELINE_STAGES.length-1) { clearInterval(t); return s; } return s+1; });
    }, 5500);
    return () => clearInterval(t);
  }, [autoplay, introPhase]);

  const goNext = () => { if (stage < PIPELINE_STAGES.length-1) { setStage(s=>s+1); setAutoplay(false); } else onComplete(); };
  const goPrev = () => { if (stage > 0) { setStage(s=>s-1); setAutoplay(false); } };

  const renderVisual = () => {
    switch(stageData.id) {
      case 'ingest': return <VisualIngest/>;
      case 'preprocess': return <VisualPreprocess/>;
      case 'statedef': return <VisualStateDef states={stageData.states} stateColors={stageData.stateColors}/>;
      case 'risk': return <VisualRisk factors={stageData.factors}/>;
      case 'compliance': return <VisualCompliance actions={stageData.actions}/>;
      default: return null;
    }
  };

  if (introPhase) return (
    <div className="min-h-screen bg-black flex flex-col items-center justify-center px-8 pt-20">
      <div className="w-full max-w-2xl">
        <div className="flex items-center gap-3 mb-6">

        <div className="bg-zinc-950 border border-green-500/20 rounded-2xl p-6 font-mono text-xs text-green-400 space-y-1.5" style={{minHeight:280}}>

        </div>
      </div>

    <div className="min-h-screen bg-[#030303] pt-20 pb-10 px-4">
      <div className="max-w-6xl mx-auto mb-6">
        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">

            <div className="flex items-center gap-2 mb-1">

          </div>
        </div>

                        {step.done&&<LucideIcon name="check" className="w-3 h-3 text-white"/>}
                      </div>
                      <div><div className={`text-sm font-bold ${step.done?'text-white':'text-slate-600'}`}>{step.label}</div>{step.date&&<div className="text-[10px] text-slate-500">{step.date}</div>}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── CITIZEN PORTAL ────────────────────────────────────────────────
const CitizenPortal = ({ reports, setReports }) => {
  const notify = useNotify();
  const [tab, setTab] = useState('report');
  const [myIds, setMyIds] = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [gpsLoading, setGpsLoading] = useState(false);
  const [form, setForm] = useState({description:'',topic:'',violationType:'',zone:'',lat:'',lng:''});

  const captureGPS = () => {
    setGpsLoading(true);
    const done = (lat,lng) => { setForm(f=>({...f,lat,lng})); setGpsLoading(false); notify('Location captured!','success'); };
    if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>done(p.coords.latitude.toFixed(4),p.coords.longitude.toFixed(4)),()=>done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4)));
    else done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4));
  };

  const handleReport = e => {
    e.preventDefault();
    if(!form.description||!form.topic||!form.violationType||!form.zone){notify('Please fill all required fields','error');return;}
    setSubmitting(true);
    setTimeout(()=>{
      const rep={id:genId(),topic:form.topic,coords:form.lat&&form.lng?`${form.lat}° N, ${form.lng}° E`:'28.6139° N, 77.2090° E',lat:parseFloat(form.lat)||28.6139,lng:parseFloat(form.lng)||77.2090,status:'Pending Review',risk:Math.floor(Math.random()*40)+30,loss:`${(Math.random()*10+1).toFixed(1)}%`,date:new Date().toISOString().split('T')[0],citizen:'Anonymous Citizen',description:form.description,zone:form.zone,violationType:form.violationType};
      setReports(p=>[rep,...p]);setMyIds(p=>[rep.id,...p]);setSubmitting(false);setSubmitted(true);
      setForm({description:'',topic:'',violationType:'',zone:'',lat:'',lng:''});
      notify('Report submitted successfully!','success');
      setTimeout(()=>{setSubmitted(false);setTab('track');},2500);
    },1800);
  };

  const myReports = reports.filter(r=>myIds.includes(r.id));
  const stepsFor = rep => [
    {label:'Submitted',done:true,date:rep.date},{label:'Viewed by Authority',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status)},{label:'AI Analysis Complete',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status),date:'Automated'},{label:'Investigation Started',done:['Under Investigation','Resolved','Closed'].includes(rep.status)},{label:'Resolved',done:['Resolved','Closed'].includes(rep.status)}
  ];

  return (
    <div className="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
      <div className="max-w-4xl mx-auto">
        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
          <div><h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Citizen Empowerment Portal</h1><p className="text-slate-500">Transparent environmental governance at your fingertips.</p></div>
          <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
            {[['report','New Complaint'],['track','Track Status'],['public','All Reports']].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${tab===id?'bg-blue-600 text-white shadow-md':'text-slate-600'}`}>{label}</button>
            ))}
          </div>
        </header>
        <div className="grid md:grid-cols-3 gap-8">
          <div className="md:col-span-2 space-y-6">
            {tab==='report' && (
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                {submitted ? (
                  <div className="text-center py-10">
                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><LucideIcon name="check-circle-2" className="w-8 h-8 text-green-500"/></div>
                    <h3 className="text-xl font-bold text-slate-900 mb-2">Report Submitted Successfully</h3>
                    <p className="text-slate-500 text-sm">Redirecting to tracking…</p>
                  </div>
                ) : (
                  <form onSubmit={handleReport} className="space-y-5">
                    <h3 className="text-xl font-bold text-slate-800">Report an Observation</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Title *</label><input required value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))} placeholder="E.g., Illegal tree felling" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Violation Type *</label><select required value={form.violationType} onChange={e=>setForm(f=>({...f,violationType:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm outline-none cursor-pointer"><option value="">Select…</option>{VIOLATION_TYPES.map(v=><option key={v}>{v}</option>)}</select></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Forest Zone *</label><select required value={form.zone} onChange={e=>setForm(f=>({...f,zone:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm outline-none cursor-pointer"><option value="">Select zone…</option>{ZONES.map(z=><option key={z}>{z}</option>)}</select></div>
                      <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Location</label><div onClick={captureGPS} className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl p-3 cursor-pointer hover:bg-slate-100"><LucideIcon name="map-pin" className="w-4 h-4 text-blue-600"/><span className="text-xs font-medium text-slate-400 italic">{gpsLoading?'Detecting…':form.lat?`${form.lat}° N`:'Auto-detect GPS…'}</span></div></div>
                    </div>
                    <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Description *</label><textarea required value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="What are you seeing?" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 h-32 focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none"></textarea></div>
                    <button type="submit" disabled={submitting} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                      {submitting?<><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Submitting…</>:'Finalize & Send Report'}
                    </button>
                  </form>
                )}
              </div>
            )}
            {tab==='track' && (
              <div className="space-y-4">
                {myReports.length===0?(<div className="bg-white p-12 rounded-3xl border border-slate-200 text-center"><p className="text-slate-400 text-sm mb-4">No reports submitted yet.</p><button onClick={()=>setTab('report')} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">Submit a Report</button></div>):myReports.map(rep=>(
                  <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start mb-4">
                      <div><span className="text-[10px] font-mono text-slate-400">{rep.id}</span><h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3><p className="text-xs text-slate-400">{rep.zone} • {rep.date}</p></div>
                      <div className="flex items-center gap-2"><span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span><button onClick={()=>setExpanded(expanded===rep.id?null:rep.id)} className="text-xs text-slate-400 hover:text-slate-600">{expanded===rep.id?'Hide':'Details'}</button></div>
                    </div>
                    {expanded===rep.id && (<div className="relative pt-6"><div className="absolute top-0 left-4 w-0.5 h-full bg-slate-100"></div>{stepsFor(rep).map((step,idx)=>(<div key={idx} className="flex gap-4 mb-4 relative z-10"><div className={`w-8 h-8 rounded-full border-4 border-white flex items-center justify-center ${step.done?'bg-green-500':'bg-slate-200'}`}>{step.done&&<LucideIcon name="check-circle-2" className="w-4 h-4 text-white"/>}</div><div><div className={`text-sm font-bold ${step.done?'text-slate-800':'text-slate-400'}`}>{step.label}</div>{step.date&&<div className="text-[10px] text-slate-400">{step.date}</div>}</div></div>))}</div>)}
                  </div>
                ))}
              </div>
            )}
            {tab==='public' && (
              <div className="space-y-4">
                <h3 className="font-bold text-slate-800">All Reported Incidents ({reports.length})</h3>
                {reports.map(rep=>(
                  <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start mb-2">
                      <div><span className="text-[10px] font-mono text-slate-400">{rep.id}</span><h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3><p className="text-xs text-slate-400">{rep.zone||'—'} • {rep.violationType||'—'} • {rep.date}</p></div>
                      <div className="flex items-center gap-2"><span className="text-xs font-bold px-2 py-1 rounded-full" style={{background:rep.risk>=75?'#fee2e2':rep.risk>=50?'#fef9c3':'#dcfce7',color:rep.risk>=75?'#b91c1c':rep.risk>=50?'#a16207':'#15803d'}}>{rep.risk}% risk</span><span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div className="space-y-6 text-slate-800">
            <div className="bg-white p-6 rounded-3xl border border-slate-200 space-y-4"><h4 className="text-sm font-bold">Why Transparency Matters</h4><p className="text-xs text-slate-500 leading-relaxed">Every observation submitted is backed by satellite auditing via ARANYA's detection core. Your report becomes official evidence in NGT proceedings.</p><div className="p-4 bg-slate-50 rounded-2xl flex items-center gap-3"><LucideIcon name="shield" className="w-8 h-8 text-blue-600"/><div className="text-xs text-slate-700 font-medium">Classed as Official Evidence</div></div></div>
            <div className="bg-slate-900 p-6 rounded-3xl text-white space-y-4 shadow-xl">
              <h4 className="text-sm font-bold">Community Impact</h4>
              <div className="flex items-center gap-4"><div className="text-2xl font-black text-green-500">{reports.filter(r=>['Resolved','Closed'].includes(r.status)).length||'0'}</div><div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Cases Resolved This Quarter</div></div>
              <div className="flex items-center gap-4"><div className="text-2xl font-black text-blue-400">{reports.length}</div><div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Total Reports Filed</div></div>
              <div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden"><div className="bg-green-500 h-full transition-all duration-700" style={{width:`${reports.length>0?Math.round(reports.filter(r=>['Resolved','Closed'].includes(r.status)).length/reports.length*100):0}%`}}></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────
const App = () => {
  const [view, setView] = useState('simulation');
  const [userRole, setUserRole] = useState(null);
  const [reports, setReports] = useState(INITIAL_REPORTS);

  const handleLogin = role => { setUserRole(role); setView(role); };
  const handleLogout = () => { setUserRole(null); };

  useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [view]);

  return (
    <NotificationProvider>
      <div className="min-h-screen">
        <Navigation setView={setView} userRole={userRole} onLogout={handleLogout}/>
        {view==='simulation' && <SimulationScreen onComplete={() => setView('login')}/>}
        {view==='login' && <LoginScreen onLogin={handleLogin}/>}
        {view==='gov' && <GovDashboard reports={reports} setReports={setReports} onLogout={handleLogout}/>}
        {view==='citizen' && <CitizenPortal reports={reports} setReports={setReports} onLogout={handleLogout}/>}
      </div>
    </NotificationProvider>
  );
};

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
