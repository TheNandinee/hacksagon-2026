<!DOCTYPE html>
<html lang="en">
<head>

        .grid-bg { background-image: radial-gradient(rgba(34,197,94,0.15) 1px, transparent 1px); background-size: 30px 30px; }

        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }

        @keyframes slide-in-right { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slide-in-left { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes fade-in-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes progress-fill { from{width:0%} to{width:var(--target-width)} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        @keyframes orbit { from{transform:rotate(0deg) translateX(60px) rotate(0deg)} to{transform:rotate(360deg) translateX(60px) rotate(-360deg)} }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;
const { motion, AnimatePresence, useScroll, useTransform, useSpring } = FramerMotion;

const LucideIcon = ({ name, className="w-5 h-5", size, color, strokeWidth }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current) {
            ref.current.innerHTML = '';
            const el = document.createElement('i');
            el.setAttribute('data-lucide', name);
            ref.current.appendChild(el);
            window.lucide.createIcons({ elements:[el], attrs:{ class:className, ...(size&&{width:size,height:size}), ...(color&&{stroke:color}), ...(strokeWidth&&{'stroke-width':strokeWidth}) }, nameAttr:'data-lucide' });
        }
    }, [name, className, size, color, strokeWidth]);
    return <span ref={ref} className="inline-flex items-center justify-center shrink-0"></span>;
};

    // Scene 1 & 2: Earth Zoom
    // Earth scale from small dot to filling screen
    const earthScale = useTransform(scrollYProgress, [0, 0.1, 0.4, 0.6], [0.05, 0.1, 1, 40]);
    const earthOpacity = useTransform(scrollYProgress, [0, 0.05, 0.6, 0.7], [0, 1, 1, 0]);
    const earthRotate = useTransform(scrollYProgress, [0, 1], [0, 45]);
    
    // Subcontinent / Ridge Appearances (Simulation via scale/opacity)
    const indiaOpacity = useTransform(scrollYProgress, [0.4, 0.5], [0, 1]);
    const ridgeOpacity = useTransform(scrollYProgress, [0.55, 0.6], [0, 1]);

    // Scene 3: A.R.A.N.Y.A Reveal
    const titleOpacity = useTransform(scrollYProgress, [0.65, 0.7, 0.85, 0.9], [0, 1, 1, 0]);
    const letterY = useTransform(scrollYProgress, [0.65, 0.7], [50, 0]);
    
    // Scene 4: Problem Statement
    const problemOpacity = useTransform(scrollYProgress, [0.8, 0.85, 0.95, 0.98], [0, 1, 1, 0]);
    
    // Scene 5: Button
    const buttonOpacity = useTransform(scrollYProgress, [0.95, 0.98], [0, 1]);

    const letters = "ARANYA".split("");
    const expansion = "Autonomous · Real-time · Analytics · for · Natural · Yield · Area · Protection";

    return (
        <div ref={containerRef} className="intro-container">
            {/* Scene 1 & 2: The Space Zoom */}
            <div className="scene-fixed">

                    style={{ scale: earthScale, opacity: earthOpacity, rotate: earthRotate }}
                    className="earth-container"
                >

                        className="earth-img rounded-full shadow-[0_0_100px_rgba(59,130,246,0.5)]"
                        alt="Earth"
                    />
                    
                    {/* Overlay for India Zoom */}
                    <motion.div 
                        style={{ opacity: indiaOpacity }}
                        className="absolute inset-0 flex items-center justify-center"
                    >
                        <img 
                            src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=2000&auto=format&fit=crop" 
                            className="w-full h-full object-cover rounded-full"
                            alt="India"
                        />
                    </motion.div>

                    {/* Overlay for Aravali Ridge */}
                    <motion.div 
                        style={{ opacity: ridgeOpacity }}
                        className="absolute inset-0 flex items-center justify-center"
                    >
                        <img 
                            src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000&auto=format&fit=crop" 
                            className="w-full h-full object-cover rounded-full"
                            alt="Aravali"
                        />
                    </motion.div>
                </motion.div>
            </div>

            {/* Scene 3: The Reveal */}
            <motion.div style={{ opacity: titleOpacity }} className="scene-fixed flex-col">
                <div className="flex mb-8">
                    {letters.map((l, i) => (
                        <motion.span 
                            key={i}
                            initial={{ opacity: 0, y: 20 }}
                            whileInView={{ opacity: 1, y: 0 }}
                            transition={{ delay: i * 0.1 }}
                            className="letter text-green-500"
                        >
                            {l}
                        </motion.span>
                    ))}
                </div>
                <motion.p 
                    initial={{ opacity: 0 }}
                    whileInView={{ opacity: 1 }}
                    transition={{ delay: 0.8, duration: 1 }}
                    className="text-slate-400 font-mono text-sm max-w-2xl px-6"
                >
                    {expansion}
                </motion.p>
            </motion.div>

            {/* Scene 4: Problem Statement */}
            <motion.div style={{ opacity: problemOpacity }} className="scene-fixed px-8">
                <div className="max-w-3xl text-center">
                    <h2 className="text-3xl md:text-5xl font-bold leading-tight">
                        The Aravali hills — <span className="text-red-500">2 billion years old</span> — are disappearing.
                    </h2>
                    <p className="text-xl text-slate-400 mt-6 font-light">
                        We built a system to catch who's doing it.
                    </p>
                </div>
            </motion.div>

            {/* Scene 5: Final Transition */}
            <motion.div style={{ opacity: buttonOpacity, pointerEvents: 'auto' }} className="scene-fixed">
                <button 
                    onClick={onComplete}
                    className="group relative px-12 py-5 bg-green-500 text-black font-black text-xl rounded-2xl hover:bg-white transition-all transform hover:scale-110 shadow-[0_0_50px_rgba(34,197,94,0.4)]"
                >
                    Enter ARANYA →
                    <div className="absolute -inset-1 bg-green-500 rounded-2xl blur opacity-30 group-hover:opacity-60 transition"></div>
                </button>
            </motion.div>
        </div>
    );
};

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
const NotifCtx = createContext(null);
const useNotify = () => useContext(NotifCtx);
const NotificationProvider = ({ children }) => {
    const [notifs, setNotifs] = useState([]);
    const notify = useCallback((msg, type='info') => {
        const id = Date.now();
        setNotifs(p => [...p, { id, msg, type }]);
        setTimeout(() => setNotifs(p => p.filter(n => n.id !== id)), 4000);
    }, []);
    return (
        <NotifCtx.Provider value={notify}>
            {children}
            <div style={{ position:'fixed', top:76, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8, width:320 }}>
                {notifs.map(n => (
                    <div key={n.id} className="notif-enter glass-dark rounded-xl px-4 py-3 flex items-center gap-3 text-sm"
                        style={{ borderLeft:`3px solid ${n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6'}` }}>
                        <span style={{ color:n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6', fontWeight:700 }}>{n.type==='success'?'✓':n.type==='error'?'✕':'ℹ'}</span>
                        <span className="text-slate-200 flex-1">{n.msg}</span>
                    </div>
                ))}
            </div>
        </NotifCtx.Provider>
    );
};

// ── CITIZEN PORTAL ────────────────────────────────────────────────────────────
const CitizenPortal = ({ reports, setReports }) => {
    const notify = useNotify();
    const [tab, setTab] = useState('report');
    const [myIds, setMyIds] = useState([]);
    const [submitting, setSubmitting] = useState(false);
    const [submitted, setSubmitted] = useState(false);
    const [expanded, setExpanded] = useState(null);
    const [gpsLoading, setGpsLoading] = useState(false);
    const [form, setForm] = useState({ description:'', topic:'', violationType:'', zone:'', lat:'', lng:'' });
    
    const captureGPS = () => {
        setGpsLoading(true);
        const done = (lat,lng) => { setForm(f=>({...f,lat,lng})); setGpsLoading(false); notify('Location captured!','success'); };
        if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>done(p.coords.latitude.toFixed(4),p.coords.longitude.toFixed(4)),()=>done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4)));
        else done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4));
    };

    const handleReport = e => {
        e.preventDefault();
        if(!form.description||!form.topic||!form.violationType||!form.zone){ notify('Please fill all required fields','error'); return; }
        setSubmitting(true);
        setTimeout(()=>{
            const rep = { id:genId(), topic:form.topic, coords:form.lat&&form.lng?`${form.lat}° N, ${form.lng}° E`:'28.6139° N, 77.2090° E', lat:parseFloat(form.lat)||28.6139, lng:parseFloat(form.lng)||77.2090, status:'Pending Review', risk:Math.floor(Math.random()*40)+30, loss:`${(Math.random()*10+1).toFixed(1)}%`, date:new Date().toISOString().split('T')[0], citizen:'Anonymous Citizen', description:form.description, zone:form.zone, violationType:form.violationType };
            setReports(p=>[rep,...p]); setMyIds(p=>[rep.id,...p]); setSubmitting(false); setSubmitted(true);
            setForm({description:'',topic:'',violationType:'',zone:'',lat:'',lng:''});
            notify('Report submitted successfully!','success');
            setTimeout(()=>{ setSubmitted(false); setTab('track'); },2500);
        },1800);
    };

    const myReports = reports.filter(r=>myIds.includes(r.id));

    return (
        <div className="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
            <div className="max-w-4xl mx-auto">
                <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div><h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Citizen Empowerment Portal</h1><p className="text-slate-500">Transparent environmental governance at your fingertips.</p></div>
                    <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                        {['report','track'].map(t=>(
                            <button key={t} onClick={()=>setTab(t)} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${tab===t?'bg-green-500 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}>{t==='report'?'New Report':'Track Status'}</button>
                        ))}
                    </div>
                </header>

                {tab==='report' ? (
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                        <div className="bg-green-500 p-6 text-white">
                            <h2 className="text-xl font-bold flex items-center gap-2"><LucideIcon name="plus-circle" /> Submit New Violation Intel</h2>
                            <p className="text-green-100 text-sm opacity-90">Your report will be processed by ARANYA's AI core within 24 hours.</p>
                        </div>
                        <form onSubmit={handleReport} className="p-8 grid md:grid-cols-2 gap-6">
                            <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Subject / Title</label><input value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition-all text-slate-900" placeholder="e.g. Unauthorized clearing near Ridge Road"/></div>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Violation Category</label><select value={form.violationType} onChange={e=>setForm(f=>({...f,violationType:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none text-slate-900"><option value="">Select Category</option>{VIOLATION_TYPES.map(v=><option key={v} value={v}>{v}</option>)}</select></div>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Impact Zone</label><select value={form.zone} onChange={e=>setForm(f=>({...f,zone:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none text-slate-900"><option value="">Select Zone</option>{ZONES.map(z=><option key={z} value={z}>{z}</option>)}</select></div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Precise Location (GPS)</label>
                                <div className="flex gap-3">
                                    <input value={form.lat} readOnly className="flex-1 bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 text-slate-500 text-sm" placeholder="Latitude"/>
                                    <input value={form.lng} readOnly className="flex-1 bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 text-slate-500 text-sm" placeholder="Longitude"/>
                                    <button type="button" onClick={captureGPS} className="bg-slate-900 text-white px-6 rounded-xl hover:bg-black transition-colors flex items-center gap-2 text-sm font-bold disabled:opacity-50" disabled={gpsLoading}>{gpsLoading?'Locating...':<><LucideIcon name="map-pin" size={16}/> Capture</>}</button>
                                </div>
                            </div>
                            <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Detailed Observations</label><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows="4" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition-all text-slate-900" placeholder="Describe the activity, machinery seen, or time of day..."></textarea></div>
                            <div className="md:col-span-2 pt-4"><button type="submit" disabled={submitting||submitted} className="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-green-500/30 transition-all flex items-center justify-center gap-3 text-lg disabled:bg-slate-300 disabled:shadow-none">{submitting?'PROCESSING INTEL...':submitted?'INTEL RECEIVED ✓':'TRANSMIT TO ARANYA CORE'}</button></div>
                        </form>
                    </div>
                ) : (
                    <div className="space-y-4">
                        {myReports.length === 0 ? (
                            <div className="bg-white p-12 rounded-3xl text-center border-2 border-dashed border-slate-200"><LucideIcon name="inbox" size={48} className="mx-auto text-slate-300 mb-4"/><h3 className="text-xl font-bold text-slate-900">No active reports</h3><p className="text-slate-500">Your submitted intelligence will appear here for tracking.</p></div>
                        ) : (
                            myReports.map(rep => (
                                <div key={rep.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-6 flex justify-between items-start gap-4" onClick={()=>setExpanded(expanded===rep.id?null:rep.id)}>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className="text-[10px] font-mono font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">{rep.id}</span>
                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${rep.status==='Resolved'?'bg-green-100 text-green-600':'bg-blue-100 text-blue-600'}`}>{rep.status.toUpperCase()}</span>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-900">{rep.topic}</h3>
                                            <p className="text-slate-500 text-sm mt-1 flex items-center gap-1"><LucideIcon name="map-pin" size={12}/> {rep.zone}</p>
                                        </div>
                                        <LucideIcon name={expanded===rep.id?'chevron-up':'chevron-down'} className="text-slate-400" />
                                    </div>
                                    {expanded===rep.id && (
                                        <div className="px-6 pb-8 pt-2 border-t border-slate-50">
                                            <div className="grid md:grid-cols-2 gap-8 mt-4">
                                                <div className="space-y-6">
                                                    <div><h4 className="text-xs font-bold text-slate-400 uppercase mb-3">Enforcement Timeline</h4>
                                                        <div className="space-y-4">

                                                                {label:'Viewed by Authority',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status)},
                                                                {label:'AI Analysis Complete',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status),date:'Automated'},
                                                                {label:'Investigation Started',done:['Under Investigation','Resolved','Closed'].includes(rep.status)},

                                                    <h4 className="text-xs font-bold text-slate-400 uppercase mb-3">Authority Feedback</h4>
                                                    {rep.status==='Pending Review' ? (
                                                        <div className="text-slate-400 text-sm italic">Intelligence is currently being ingested into the neural pipeline for change-detection verification.</div>
                                                    ) : (
                                                        <div className="space-y-3">
                                                            <div className="text-slate-700 text-sm leading-relaxed">Authority has acknowledged the report. Satellite confirmation indicates a <span className="font-bold text-red-500">{rep.risk}% match</span> with reported activity.</div>
                                                            <div className="bg-white p-3 rounded-xl border border-slate-200 text-[11px] text-slate-500 font-mono">CASE_LOG: Aerial surveillance scheduled for next revisit cycle. Geo-tagged dossier transmitted to regional forest office.</div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                )}
            </div>
        </div>
    );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
    const [view, setView] = useState('intro'); // Start with cinematic intro
    const [userRole, setUserRole] = useState(null);
    const [reports, setReports] = useState(INITIAL_REPORTS);

    const handleLogin = role => { setUserRole(role); setView(role); };
    const handleLogout = () => { setUserRole(null); };

    useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, []);

    return (
        <NotificationProvider>
            <div className="min-h-screen">
                {view !== 'intro' && (
                    <Navigation view={view} setView={setView} userRole={userRole} onLogout={handleLogout}/>
                )}
                <AnimatePresence mode="wait">
                    {view==='intro' && (
                        <motion.div key="intro" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <CinematicIntro onComplete={() => setView('landing')} />
                        </motion.div>
                    )}
                    {view==='landing' && (
                        <motion.div key="landing" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <LandingPage onStart={() => setView('simulation')}/>
                        </motion.div>
                    )}
                    {view==='simulation' && (
                        <motion.div key="sim" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <SimulationScreen onComplete={() => setView('login')}/>
                        </motion.div>
                    )}
                    {view==='login' && (
                        <motion.div key="login" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <LoginScreen onLogin={handleLogin}/>
                        </motion.div>
                    )}
                    {view==='gov' && (
                        <motion.div key="gov" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <GovDashboard reports={reports} setReports={setReports} onLogout={handleLogout}/>
                        </motion.div>
                    )}
                    {view==='citizen' && (
                        <motion.div key="citizen" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <CitizenPortal reports={reports} setReports={setReports} onLogout={handleLogout}/>
                        </motion.div>
                    )}
                </AnimatePresence>
            </div>
        </NotificationProvider>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
