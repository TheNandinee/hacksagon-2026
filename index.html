<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARANYA | Autonomous Real-time Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        .section {
            position: relative;
            width: 100%;
            height: 200vh; /* Increased height for smoother scroll transitions */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .content-box {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            opacity: 0;
        }

        h1.aranya-title {
            font-size: 5rem;
            letter-spacing: 1.5rem;
            margin: 0;
            font-weight: 200;
            text-transform: uppercase;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            margin-top: 2rem;
            font-weight: 300;
            color: #aaa;
            text-transform: uppercase;
        }

        .word {
            display: inline-block;
            opacity: 0;
            margin: 0 5px;
        }

        .problem-text {
            font-size: 1.8rem;
            line-height: 1.6;
            font-weight: 300;
            font-style: italic;
            color: #eee;
        }

        .cta-button {
            pointer-events: all;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Progress indicator */
        #scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* India Highlight Overlay */
        #india-highlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="india-highlight"></div>
    <div id="scroll-hint">Scroll to explore</div>

    <!-- Scene 1: The Hook (0-4s) -->
    <div class="section" id="scene1"></div>

    <!-- Scene 2: The Zoom (4-12s) -->
    <div class="section" id="scene2"></div>

    <!-- Scene 3: The Reveal (12-18s) -->
    <div class="section" id="scene3">
        <div class="content-box" id="reveal-box">
            <h1 class="aranya-title">
                <span class="letter">A</span>
                <span class="letter">R</span>
                <span class="letter">A</span>
                <span class="letter">N</span>
                <span class="letter">Y</span>
                <span class="letter">A</span>
            </h1>
            <div class="subtitle">
                <span class="word">Autonomous</span>
                <span class="word">·</span>
                <span class="word">Real-time</span>
                <span class="word">·</span>
                <span class="word">Analytics</span>
                <span class="word">·</span>
                <span class="word">for</span>
                <span class="word">·</span>
                <span class="word">Natural</span>
                <span class="word">·</span>
                <span class="word">Yield</span>
                <span class="word">·</span>
                <span class="word">Area</span>
                <span class="word">·</span>
                <span class="word">Protection</span>
            </div>
        </div>
    </div>

    <!-- Scene 4: The Problem Statement (18-25s) -->
    <div class="section" id="scene4">
        <div class="content-box" id="problem-box">
            <p class="problem-text">
                "The Aravali hills — 2 billion years old — are disappearing. <br>
                We built a system to catch who's doing it."
            </p>
        </div>
    </div>

    <!-- Scene 5: Transition to dashboard -->
    <div class="section" id="scene5">
        <div class="content-box" id="cta-box">
            <a href="http://localhost:8501" class="cta-button">Enter ARANYA &rarr;</a>
        </div>
    </div>

    <script>
        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Textures (using placeholders that look good, high-res NASA-style)
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormal = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // Earth Group
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Earth Sphere
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTexture,
            normalMap: earthNormal,
            specularMap: earthSpecular,
            specular: new THREE.Color('grey'),
            shininess: 5
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        // Clouds Sphere
        const cloudGeo = new THREE.SphereGeometry(1.015, 64, 64);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: cloudsTexture,
            transparent: true,
            opacity: 0.8
        });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        earthGroup.add(cloudMesh);

        // Atmosphere Glow (Inner)
        const atmosGeo = new THREE.SphereGeometry(1.02, 64, 64);
        const atmosMat = new THREE.MeshBasicMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.2,
            side: THREE.BackSide
        });
        const atmosMesh = new THREE.Mesh(atmosGeo, atmosMat);
        earthGroup.add(atmosMesh);

        // Atmosphere Glow (Outer)
        const outerAtmosGeo = new THREE.SphereGeometry(1.08, 64, 64);
        const outerAtmosMat = new THREE.MeshBasicMaterial({
            color: 0x2244aa,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const outerAtmosMesh = new THREE.Mesh(outerAtmosGeo, outerAtmosMat);
        earthGroup.add(outerAtmosMesh);

        // Stars Background (Layered for depth)
        function createStars(count, size, range) {
            const geo = new THREE.BufferGeometry();
            const coords = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) {
                coords[i] = (Math.random() - 0.5) * range;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: size, transparent: true, opacity: 0.8 }));
        }
        scene.add(createStars(3000, 0.03, 100));
        scene.add(createStars(1000, 0.06, 150));

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // Starfield background groups for parallax
        const starGroup1 = createStars(3000, 0.03, 100);
        const starGroup2 = createStars(1000, 0.06, 150);
        scene.add(starGroup1);
        scene.add(starGroup2);

        // Initial Position
        camera.position.z = 5;
        // Tilt Earth to show India better
        earthGroup.rotation.y = -Math.PI / 2.5; 
        earthGroup.rotation.x = 0.3; 

        // --- Animation Logic ---
        function animate() {
            requestAnimationFrame(animate);
            // Constant slow rotation
            earthGroup.rotation.y += 0.0003;
            cloudMesh.rotation.y += 0.0005;
            
            // Subtle star movement
            starGroup1.rotation.y += 0.0001;
            starGroup2.rotation.y += 0.00005;
            
            renderer.render(scene, camera);
        }
        animate();

        // --- GSAP Scroll Animations ---
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 2,
            }
        });

        // Scene 1 -> 2: The Zoom (Initial slow, then fast)
        tl.to(camera.position, { z: 1.1, ease: "power4.inOut" }, 0);
        tl.to(earthGroup.rotation, { 
            y: Math.PI * 0.44, 
            x: 0.45, 
            ease: "power4.inOut" 
        }, 0);

        // Fade in India Highlight
        tl.to("#india-highlight", { opacity: 0.7, duration: 0.5 }, 0.3);

        // Scene 3: The Reveal (Letters drop with pulse)
        tl.to("#reveal-box", { opacity: 1, duration: 0.2 }, 0.4);
        
        const letters = document.querySelectorAll('.letter');
        letters.forEach((letter, i) => {
            tl.to(letter, { 
                opacity: 1, 
                y: 0, 
                scale: 1.4, 
                duration: 0.1, 
                ease: "back.out"
            }, 0.5 + (i * 0.08));
            tl.to(letter, { scale: 1, duration: 0.1, boxShadow: "0 0 15px rgba(255,255,255,0.5)" }, 0.6 + (i * 0.08));
        });

        const words = document.querySelectorAll('.word');
        words.forEach((word, i) => {
            tl.to(word, { opacity: 1, duration: 0.1 }, 1.2 + (i * 0.05));
        });

        // Scene 4: Problem Statement (Fade in text)
        tl.to("#reveal-box", { opacity: 0, y: -100, filter: "blur(10px)", duration: 0.4 }, 1.8);
        tl.to("#problem-box", { opacity: 1, duration: 0.5 }, 2.2);
        
        // Scene 5: Final Transition to CTA
        tl.to("#problem-box", { opacity: 0, y: -50, filter: "blur(5px)", duration: 0.4 }, 2.8);
        tl.to("#cta-box", { opacity: 1, y: 0, duration: 0.5 }, 3.2);
        tl.to(camera.position, { z: 1.05, duration: 0.5 }, 3.2); 

        // Initial states
        gsap.set("#cta-box", { y: 50 });

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
