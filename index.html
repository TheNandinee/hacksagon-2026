<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARANYA | Autonomous Real-time Analytics for Natural Yield & Area Protection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ─── RESET ─────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ─── CINEMATIC SECTION ──────────────────────────
   KEY FIX: body scrolls normally. Three.js canvas
   is position:fixed behind everything. Scroll
   sections are in normal document flow so GSAP
   ScrollTrigger works correctly.
────────────────────────────────────────────────── */
body {
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Three.js canvas pinned behind scroll */
#three-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100vh;
  z-index: 1;
  pointer-events: none;
}

/* Vignette overlay */
#vignette {
  position: fixed;
  inset: 0; z-index: 2;
  pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 0%,
    rgba(0,0,0,0.55) 100%);
}

/* Scanlines */
#scanlines {
  position: fixed;
  inset: 0; z-index: 3;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,255,136,0.025),
    rgba(0,255,136,0.025) 1px,
    transparent 1px,
    transparent 2px
  );
  animation: scanShift 8s linear infinite;
}
@keyframes scanShift {
  0%   { transform: translateY(0); }
  100% { transform: translateY(10px); }
}

/* HUD coordinate readout */
#hud {
  position: fixed;
  top: 1.5rem; right: 1.5rem;
  z-index: 20;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: rgba(0,255,136,0.6);
  letter-spacing: 0.12em;
  line-height: 2;
  text-align: right;
  opacity: 0;
  transition: opacity 0.8s;
  pointer-events: none;
}

/* Aravali ping marker */
#data-marker {
  position: fixed;
  top: 50%; left: 50%;
  width: 60px; height: 60px;
  transform: translate(-50%, -50%);
  z-index: 5;
  opacity: 0;
  pointer-events: none;
}
.marker-ring {
  width: 100%; height: 100%;
  border: 2px solid #00ff88;
  border-radius: 50%;
  box-shadow: 0 0 15px #00ff88;
  animation: pulseRing 2s ease-out infinite;
}
@keyframes pulseRing {
  0%   { transform: scale(1);   opacity: 1; }
  100% { transform: scale(1.6); opacity: 0; }
}
.marker-dot {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  transform: translate(-50%, -50%);
  background: #00ff88;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ff88;
}

/* Scroll hint */
#scroll-hint {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #00ff88;
  text-shadow: 0 0 8px #00ff88;
  animation: scrollPulse 2.5s infinite;
  pointer-events: none;
}
@keyframes scrollPulse {
  0%,100% { opacity:0.3; transform:translateX(-50%) translateY(0); }
  50%      { opacity:1;   transform:translateX(-50%) translateY(5px); }
}

/* ─── CINEMATIC SCROLL SECTIONS ──────────────────
   These are in normal document flow — GSAP can
   measure them and ScrollTrigger works correctly.
────────────────────────────────────────────────── */
#cinematic-wrap {
  position: relative;
  z-index: 10;
}

.cin-section {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ARANYA title */
.aranya-title {
  font-family: 'Space Mono', monospace;
  font-size: clamp(3.5rem, 9vw, 7rem);
  font-weight: 700;
  letter-spacing: 0.45em;
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88, 0 0 25px #00ff88;
  line-height: 1;
}

.letter {
  display: inline-block;
  opacity: 0;
  transform: translateY(50px) scale(0.8);
  margin: 0 6px;
  transition: none;
}
.letter.drop {
  animation: letterDrop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes letterDrop {
  0%   { opacity:0; transform:translateY(50px) scale(0.8);
         text-shadow: 0 0 5px #00ff88; }
  55%  { opacity:1; transform:translateY(-10px) scale(1.12);
         text-shadow: 0 0 40px #00ff88, 0 0 80px #00ff88; }
  100% { opacity:1; transform:translateY(0) scale(1);
         text-shadow: 0 0 10px #00ff88, 0 0 25px #00ff88; }
}

.acronym-line {
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.55rem, 1.1vw, 0.82rem);
  letter-spacing: 0.28em;
  color: rgba(0,255,136,0.7);
  text-transform: uppercase;
  margin-top: 2rem;
  line-height: 2.2;
  text-align: center;
}
.word {
  display: inline-block;
  opacity: 0;
  margin: 0 4px;
}

/* Problem statement */
.problem-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.2rem, 2.8vw, 2rem);
  color: #fff;
  line-height: 1.9;
  letter-spacing: 0.02em;
  text-align: center;
  max-width: 860px;
  padding: 0 2rem;
  opacity: 0;
}

/* CTA */
.cta-wrap {
  text-align: center;
  opacity: 0;
}
.cta-label {
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.8rem, 1.5vw, 1.1rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88;
  margin-bottom: 1.8rem;
}
.cta-btn {
  display: inline-block;
  padding: 18px 54px;
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #00ff88;
  background: transparent;
  border: 2px solid #00ff88;
  cursor: pointer;
  text-decoration: none;
  text-shadow: 0 0 10px #00ff88;
  box-shadow: inset 0 0 12px rgba(0,255,136,0.1);
  transition: all 0.3s ease;
}
.cta-btn:hover {
  background: rgba(0,255,136,0.1);
  box-shadow: 0 0 35px #00ff88,
              inset 0 0 18px rgba(0,255,136,0.15);
  transform: scale(1.04);
}

/* ─── APP WRAPPER ────────────────────────────────
   Hidden behind cinematic until enterApp() fires.
   Uses display:none so it doesn't affect layout.
────────────────────────────────────────────────── */
#app-shell {
  display: none;
  position: relative;
  z-index: 50;
  min-height: 100vh;
  background: #000;
}
#app-shell.active {
  display: block;
}

/* ─── REACT APP GLOBAL STYLES ─────────────────── */
.glass      { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
.glass-dark { background: rgba(0,0,0,0.6);        backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
.scan-line  {
  background: linear-gradient(to bottom, transparent, rgba(34,197,94,0.5), transparent);
  height: 100px; width: 100%;
  position: absolute;
  animation: appScan 4s linear infinite;
  pointer-events: none;
}
@keyframes appScan { from { top:-100px; } to { top:100%; } }
.grid-bg { background-image: radial-gradient(rgba(34,197,94,0.15) 1px, transparent 1px); background-size:30px 30px; }

::-webkit-scrollbar       { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }

@keyframes notif-slide { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.notif-enter { animation: notif-slide 0.3s ease; }
select option { background: #1a1a1a; color: white; }

@keyframes pulse-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(2.5);opacity:0} }
@keyframes data-flow  { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
@keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fade-in-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer    { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes highlight-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0.15)} }

.sim-stage       { animation: fade-in-up 0.5s ease forwards; }
.flow-arrow      { animation: data-flow 1.5s linear infinite; stroke-dasharray: 8 4; }
.ping-ring::after {
  content:''; position:absolute; inset:-4px;
  border-radius:50%; border:2px solid #22c55e;
  animation: pulse-ring 2s ease-out infinite;
}
.terminal-cursor::after { content:'|'; animation: blink 1s step-end infinite; color:#22c55e; }
.shimmer-bar {
  background: linear-gradient(90deg, rgba(34,197,94,0.1) 25%, rgba(34,197,94,0.3) 50%, rgba(34,197,94,0.1) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
</style>

<!-- ═══════════════════════════════════════════════════
     FIXED LAYERS (behind scroll)
═══════════════════════════════════════════════════ -->
<div id="three-canvas"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="hud">
  <div id="hud-lat">20.5937° N</div>
  <div id="hud-lon">78.9629° E</div>
  <div id="hud-alt">ALT <span id="alt-val">35,786</span> KM</div>
  <div id="hud-status" style="color:rgba(0,255,136,0.4);font-size:0.5rem;margin-top:4px;">ARANYA SENTINEL ACTIVE</div>

<!-- ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ -->
<div id="cinematic-wrap">

  <!-- Scene 1: Hook — Earth breathing in space -->
  <div class="cin-section" id="scene1">
    <!-- empty: Three.js Earth is the only visual -->
  </div>

  <!-- Scene 2: Zoom — camera punches through to Aravali -->
  <div class="cin-section" id="scene2">

  </div>

  <!-- Scene 3: The Reveal — ARANYA letters drop -->
  <div class="cin-section" id="scene3">
    <div id="reveal-box" style="text-align:center;opacity:0;padding:3rem 2rem;">

      </h1>
      <div class="acronym-line">

<!-- ═══════════════════════════════════════════════════
     REACT APP SHELL (hidden until CTA clicked)
═══════════════════════════════════════════════════ -->

<!-- ═══════════════════════════════════════════════════
     THREE.JS — CINEMATIC EARTH
═══════════════════════════════════════════════════ -->
<script>
(function initThree() {
  const container = document.getElementById('three-canvas');
  const W = window.innerWidth, H = window.innerHeight;

  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(55, W/H, 0.1, 10000);
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  container.appendChild(renderer.domElement);

  // Textures
  const tl = new THREE.TextureLoader();
  const earthTex  = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
  const earthNorm = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
  const earthSpec = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
  const cloudTex  = tl.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

  // Earth group
  const earthGroup = new THREE.Group();
  scene.add(earthGroup);

  const earthMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1, 128, 128),
    new THREE.MeshPhongMaterial({
      map: earthTex, normalMap: earthNorm, specularMap: earthSpec,
      specular: new THREE.Color(0x333333), shininess: 25,
      emissive: new THREE.Color(0x111111)
    })
  );
  earthGroup.add(earthMesh);

  const cloudMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.018, 128, 128),
    new THREE.MeshPhongMaterial({ map: cloudTex, transparent: true, opacity: 0.55 })
  );
  earthGroup.add(cloudMesh);

  // Atmosphere glow layers
  [
    [1.030, 0x00ff88, 0.07],
    [1.065, 0x4488ff, 0.10],
    [1.120, 0x2244aa, 0.05],
  ].forEach(([r, col, op]) => {
    earthGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(r, 64, 64),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: op, side: THREE.BackSide })
    ));
  });

  // Star fields — 3 layers of different sizes + subtle colours
  function makeStars(count, size, spread, col) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * spread;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: col, size, transparent: true, opacity: 0.75, sizeAttenuation: true });
    return new THREE.Points(geo, mat);
  }
  const s1 = makeStars(3500, 0.05, 160, 0xffffff);
  const s2 = makeStars(1500, 0.08, 220, 0x88ffcc);
  const s3 = makeStars(700,  0.13, 280, 0x4488ff);
  scene.add(s1); scene.add(s2); scene.add(s3);

  // Lighting
  scene.add(new THREE.AmbientLight(0x404040, 2.5));
  const sun = new THREE.DirectionalLight(0xffffff, 3.2);
  sun.position.set(8, 4, 8);
  scene.add(sun);
  const rim = new THREE.DirectionalLight(0x00ff88, 0.7);
  rim.position.set(-5, -2, -8);
  scene.add(rim);

  // Initial position — Earth faces Atlantic, we zoom toward India
  camera.position.z = 5.5;
  earthGroup.rotation.y = -Math.PI / 2.4;
  earthGroup.rotation.x = 0.25;

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    earthGroup.rotation.y += 0.000075;
    cloudMesh.rotation.y  += 0.000115;
    s1.rotation.y += 0.000038;
    s2.rotation.y += 0.000025;
    renderer.render(scene, camera);
  }
  animate();

  // ── GSAP SCROLL TIMELINE ──────────────────────────────────────
  // KEY: ScrollTrigger watches #cinematic-wrap which IS in normal flow
  gsap.registerPlugin(ScrollTrigger);

  const master = gsap.timeline({
    scrollTrigger: {
      trigger: '#cinematic-wrap',
      start:   'top top',
      end:     'bottom bottom',
      scrub:   2,
    }
  });

  // ── SCENE 1→2: zoom from space down to Aravali ridge ──
  // Stage A: initial slow pull-in (space → near-Earth orbit)
  master.to(camera.position, { z: 2.2, ease: 'power1.inOut', duration: 0.4 }, 0.0);
  master.to(earthGroup.rotation, {
    y: Math.PI * 0.44,   // rotate so India faces camera
    x: 0.50,
    ease: 'power1.inOut', duration: 0.6
  }, 0.0);

  // Stage B: acceleration through atmosphere
  master.to(camera.position, { z: 0.6, ease: 'power3.inOut', duration: 0.6 }, 0.35);

  // Stars fade as we punch through atmosphere
  master.to([s1.material, s2.material, s3.material], { opacity: 0, duration: 0.3 }, 0.45);

  // HUD and marker appear at low orbit
  master.to('#hud',         { opacity: 1, duration: 0.3 }, 0.50);
  master.to('#data-marker', { opacity: 1, duration: 0.4 }, 0.62);
  master.to('#scroll-hint', { opacity: 0, duration: 0.2 }, 0.18);

  // ── SCENE 3: letters drop ──
  master.to('#reveal-box', { opacity: 1, duration: 0.25 }, 0.65);

  // Letters drop sequentially
  document.querySelectorAll('.letter').forEach((l, i) => {
    master.call(() => l.classList.add('drop'), [], 0.72 + i * 0.12);
  });

  // Acronym words fade in word by word
  document.querySelectorAll('.word').forEach((w, i) => {
    master.to(w, { opacity: 1, duration: 0.12 }, 1.65 + i * 0.055);
  });

  // ── SCENE 4: problem statement ──
  master.to('#reveal-box', {
    opacity: 0, y: -70,
    filter: 'blur(10px)',
    duration: 0.35
  }, 2.05);
  master.to('#data-marker', { opacity: 0, duration: 0.25 }, 2.05);
  master.to('#problem-text', { opacity: 1, duration: 0.55 }, 2.30);
  // Pull back slightly — contemplative pause
  master.to(camera.position, { z: 0.85, ease: 'power2.inOut', duration: 0.6 }, 2.05);

  // ── SCENE 5: CTA ──
  master.to('#problem-text', {
    opacity: 0, y: -55,
    filter: 'blur(8px)',
    duration: 0.35
  }, 3.00);
  master.to('#cta-wrap',    { opacity: 1, duration: 0.55 }, 3.30);
  // Tight final zoom — feel of arrival
  master.to(camera.position, { z: 0.35, ease: 'power2.inOut', duration: 0.7 }, 3.30);

  // HUD lat/lon ticks toward Aravali as we zoom
  let hudInterval = setInterval(() => {
    const altEl = document.getElementById('alt-val');
    const latEl = document.getElementById('hud-lat');
    const lonEl = document.getElementById('hud-lon');
    if (!altEl) { clearInterval(hudInterval); return; }

    const scrollFrac = Math.min(1, window.scrollY / (document.body.scrollHeight - window.innerHeight));
    const alt   = Math.round(35786 * Math.pow(1 - scrollFrac, 2.4));
    const lat   = (20.59 + scrollFrac * 8.03).toFixed(4);
    const lon   = (78.96 - scrollFrac * 2.71).toFixed(4);

    altEl.textContent = alt > 1000 ? alt.toLocaleString() : alt;
    latEl.textContent = lat + '° N';
    lonEl.textContent = lon + '° E';
  }, 80);

  // Resize handler
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    ScrollTrigger.refresh();
  });

  window._threeScene = { scene, camera, renderer };
})();

// ── ENTER APP ────────────────────────────────────────────────────
function enterApp() {
  // Fade out cinematic wrap
  gsap.to('#cinematic-wrap', { opacity: 0, duration: 0.8, ease: 'power2.inOut' });
  gsap.to('#three-canvas',   { opacity: 0, duration: 0.8 });
  gsap.to('#vignette',       { opacity: 0, duration: 0.8 });
  gsap.to('#scanlines',      { opacity: 0, duration: 0.8 });
  gsap.to('#hud',            { opacity: 0, duration: 0.4 });
  gsap.to('#data-marker',    { opacity: 0, duration: 0.4 });

  setTimeout(() => {
    // Hide cinematic, show app
    document.getElementById('cinematic-wrap').style.display = 'none';
    document.getElementById('three-canvas').style.display   = 'none';
    document.getElementById('vignette').style.display       = 'none';
    document.getElementById('scanlines').style.display      = 'none';
    document.getElementById('hud').style.display            = 'none';
    document.getElementById('data-marker').style.display    = 'none';
    document.getElementById('scroll-hint').style.display    = 'none';

    const shell = document.getElementById('app-shell');
    shell.classList.add('active');
    window.scrollTo(0, 0);
    document.body.style.background = '#000';

    // Fade in
    shell.style.opacity = '0';
    requestAnimationFrame(() => {
      shell.style.transition = 'opacity 0.7s ease';
      shell.style.opacity = '1';
    });
  }, 850);
}
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

/* ── Lucide Icon wrapper ── */
const LucideIcon = ({ name, className = "w-5 h-5", size, color, strokeWidth }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!window.lucide || !ref.current) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    ref.current.appendChild(el);
    window.lucide.createIcons({
      elements: [el],
      attrs: {
        class: className,
        ...(size        && { width: size, height: size }),
        ...(color       && { stroke: color }),
        ...(strokeWidth && { 'stroke-width': strokeWidth }),
      },
      nameAttr: 'data-lucide',
    });
  }, [name, className, size, color, strokeWidth]);
  return <span ref={ref} className="inline-flex items-center justify-center shrink-0" />;
};

const SimulationScreen = ({ onComplete }) => {
  const [stage, setStage]         = useState(0);
  const [autoplay, setAutoplay]   = useState(true);
  const [booting, setBooting]     = useState(true);
  const [bootLines, setBootLines] = useState([]);

  const BOOT = [
    '> Initializing A.R.A.N.Y.A Geospatial Core v4.2...',
    '> Loading Sentinel-2 data connectors........... OK',
    '> Mounting NGT boundary shapefiles............. OK',
    '> Establishing IMD weather stream.............. OK',
    '> Calibrating Change-Detection Transformer..... OK',
    '> Risk Emission Model (v2.1) loaded............ OK',
    '> Compliance Intelligence Engine online........ OK',
    '> Connecting enforcement dossier database...... OK',
    '████████████████████ SYSTEM READY ████████████',
  ];

  useEffect(() => {
    if (!booting) return;
    let i = 0;
    const t = setInterval(() => {
      if (i < BOOT.length) setBootLines(p => [...p, BOOT[i]]);
      i++;
      if (i >= BOOT.length) { clearInterval(t); setTimeout(() => setBooting(false), 900); }
    }, 290);
    return () => clearInterval(t);
  }, [booting]);

  useEffect(() => {
    if (booting || !autoplay) return;
    const t = setInterval(() => {
      setStage(s => { if (s >= PIPELINE_STAGES.length-1) { clearInterval(t); return s; } return s+1; });
    }, 5800);
    return () => clearInterval(t);
  }, [autoplay, booting]);

  const goNext = () => { if (stage < PIPELINE_STAGES.length-1) { setStage(s=>s+1); setAutoplay(false); } else onComplete(); };
  const goPrev = () => { if (stage > 0) { setStage(s=>s-1); setAutoplay(false); } };

  const sd = PIPELINE_STAGES[stage];

  const renderVisual = () => {
    switch (sd.id) {
      case 'ingest':     return <VisualIngest />;
      case 'preprocess': return <VisualPreprocess />;
      case 'statedef':   return <VisualStateDef states={sd.states} stateColors={sd.stateColors} />;
      case 'risk':       return <VisualRisk factors={sd.factors} />;
      case 'compliance': return <VisualCompliance actions={sd.actions} />;
      default:           return null;
    }
  };

  if (booting) return (
    <div className="min-h-screen bg-black flex flex-col items-center justify-center px-8 pt-20">
      <div className="w-full max-w-2xl">
        <div className="flex items-center gap-3 mb-6">
          <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse" />
          <span className="font-mono text-green-500 text-sm font-bold tracking-widest uppercase">
            A.R.A.N.Y.A System Boot
          </span>
        </div>
        <div className="bg-zinc-950 border border-green-500/20 rounded-2xl p-6 font-mono text-xs text-green-400 space-y-1.5" style={{ minHeight:300 }}>
          {bootLines.map((line, i) => (
            <div key={i} className="sim-stage">
              <span style={{ color: line.includes('READY') ? '#22c55e' : line.includes('...') ? '#94a3b8' : '#22c55e' }}>
                {line}
              </span>
            </div>
          ))}
          {bootLines.length > 0 && bootLines.length < BOOT.length && (
            <div className="terminal-cursor text-green-500">&nbsp;</div>
          )}
        </div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-[#030303] pt-20 pb-12 px-4">

  ]);
  const unread = alerts.filter(a => !a.read).length;

  const filteredReports = useMemo(() =>
    reports.filter(r => {
      const q = searchQ.toLowerCase();

        && (filterStatus === 'All' || r.status === filterStatus);
    }), [reports, searchQ, filterStatus]);

  const updateStatus = (id, status) => {
    setReports(p => p.map(r => r.id===id ? {...r,status} : r));

  const deleteReport  = id => { setReports(p => p.filter(r => r.id!==id)); setSelectedReport(null); notify('Report removed','error'); };

      'A.R.A.N.Y.A ENFORCEMENT DOSSIER',

                      className="border-b border-white/5 hover:bg-white/2 transition-colors cursor-pointer">
                      <td className="px-4 py-3 text-green-500 font-mono text-xs">{rep.id}</td>
                      <td className="px-4 py-3 text-sm font-semibold">{rep.topic}</td>
                      <td className="px-4 py-3 text-xs text-slate-400">{rep.zone||'—'}</td>
                      <td className="px-4 py-3 text-sm font-bold"
                        style={{ color:rep.risk>=75?'#ef4444':rep.risk>=50?'#eab308':'#22c55e' }}>{rep.risk}%</td>
                      <td className="px-4 py-3">
                        <span className="text-[10px] px-2 py-0.5 rounded-full font-bold"
                          style={{ background:rep.status==='Resolved'?'rgba(34,197,94,0.15)':rep.status==='Under Investigation'?'rgba(239,68,68,0.15)':'rgba(234,179,8,0.15)', color:rep.status==='Resolved'?'#22c55e':rep.status==='Under Investigation'?'#ef4444':'#eab308' }}>
                          {rep.status}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-xs text-slate-500 font-mono">{rep.date}</td>
                      <td className="px-4 py-3" onClick={e => e.stopPropagation()}>
                        <div className="flex gap-2">
                          <button onClick={() => exportDossier(rep)} className="p-1.5 bg-green-500/10 hover:bg-green-500/20 rounded">
                            <LucideIcon name="download" className="w-3 h-3 text-green-500" />
                          </button>
                          <button onClick={() => deleteReport(rep.id)} className="p-1.5 bg-red-500/10 hover:bg-red-500/20 rounded">
                            <LucideIcon name="trash" className="w-3 h-3 text-red-500" />
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Analytics */}
        {activeNav === 'analytics' && (
          <div className="flex flex-col gap-6">
            <h2 className="text-xl font-bold">Impact Analytics</h2>
            <div className="grid md:grid-cols-4 gap-4">
              {[
                { label:'Total Reports',   val: reports.length,                                                col:'text-white'       },
                { label:'High Risk',       val: reports.filter(r=>r.risk>=75).length,                         col:'text-red-400'     },
                { label:'Under Investigation', val: reports.filter(r=>r.status==='Under Investigation').length, col:'text-yellow-400' },
                { label:'Resolved',        val: reports.filter(r=>r.status==='Resolved').length,               col:'text-green-400'  },
              ].map(c => (
                <div key={c.label} className="glass rounded-2xl p-5 border border-white/5 text-center">
                  <div className={`text-3xl font-black mb-1 ${c.col}`}>{c.val}</div>
                  <div className="text-xs font-mono text-slate-500 uppercase">{c.label}</div>
                </div>
              ))}
            </div>
            <div className="grid md:grid-cols-3 gap-6">
              <div className="glass rounded-2xl p-6 border border-white/5">
                <h3 className="text-xs font-mono text-slate-500 uppercase tracking-wider mb-4">Violation Types</h3>
                {VIOLATION_TYPES.map(type => { const c=reports.filter(r=>r.violationType===type).length; if(!c) return null; return (
                  <div key={type} className="mb-3">
                    <div className="flex justify-between text-xs mb-1"><span className="text-slate-300">{type}</span><span className="text-green-500 font-mono">{c}</span></div>
                    <div className="h-1.5 bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-green-500 rounded-full" style={{ width:`${(c/reports.length)*100}%` }} /></div>
                  </div>
                ); })}
              </div>
              <div className="glass rounded-2xl p-6 border border-white/5">
                <h3 className="text-xs font-mono text-slate-500 uppercase tracking-wider mb-4">Status Breakdown</h3>
                {STATUSES.map(status => { const c=reports.filter(r=>r.status===status).length; if(!c) return null; const col=status==='Resolved'?'#22c55e':status==='Under Investigation'?'#ef4444':'#eab308'; return (
                  <div key={status} className="mb-3">
                    <div className="flex justify-between text-xs mb-1"><span className="text-slate-300">{status}</span><span className="font-mono" style={{color:col}}>{c}</span></div>
                    <div className="h-1.5 bg-white/5 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width:`${(c/reports.length)*100}%`, background:col }} /></div>
                  </div>
                ); })}
              </div>
              <div className="glass rounded-2xl p-6 border border-white/5">
                <h3 className="text-xs font-mono text-slate-500 uppercase tracking-wider mb-4">Risk Distribution</h3>
                {[['Critical (90%+)',r=>r.risk>=90,'#ef4444'],['High (75–89%)',r=>r.risk>=75&&r.risk<90,'#f97316'],['Medium (50–74%)',r=>r.risk>=50&&r.risk<75,'#eab308'],['Low (<50%)',r=>r.risk<50,'#22c55e']].map(([label,fn,col])=>{const c=reports.filter(fn).length;return(
                  <div key={label} className="flex items-center gap-3 mb-3">
                    <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background:col}}/>
                    <span className="text-xs text-slate-300 flex-1">{label}</span>
                    <span className="font-mono text-xs" style={{color:col}}>{c}</span>
                  </div>
                );})}
              </div>
            </div>
          </div>
        )}

        {/* Alerts */}
        {activeNav === 'alerts' && (
          <div className="flex flex-col gap-6">
            <div className="flex justify-between items-center">
              <h2 className="text-xl font-bold">Enforcement Ops</h2>
              <button onClick={() => setAlerts(p => p.map(a => ({...a,read:true})))}
                className="text-xs bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-2 rounded-lg hover:bg-green-500/20 transition-colors">
                Mark All Read
              </button>
            </div>
            {alerts.map(alert => (
              <div key={alert.id}
                onClick={() => setAlerts(p => p.map(a => a.id===alert.id ? {...a,read:true} : a))}
                className={`p-5 glass border rounded-2xl cursor-pointer transition-all ${alert.read ? 'border-white/5 opacity-60' : 'border-white/10 hover:border-white/15'}`}>
                <div className="flex justify-between items-start">
                  <div className="flex items-center gap-3">
                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center ${alert.type==='CRITICAL'?'bg-red-500/15':alert.type==='WARNING'?'bg-yellow-500/15':'bg-blue-500/15'}`}>
                      <LucideIcon name={alert.type==='INFO'?'info':'alert-triangle'} className="w-4 h-4"
                        color={alert.type==='CRITICAL'?'#ef4444':alert.type==='WARNING'?'#eab308':'#3b82f6'} />
                    </div>
                    <div>
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded mb-1 inline-block ${alert.type==='CRITICAL'?'bg-red-500/20 text-red-500':alert.type==='WARNING'?'bg-yellow-500/20 text-yellow-500':'bg-blue-500/20 text-blue-400'}`}>
                        {alert.type}
                      </span>
                      <p className={`text-sm font-medium ${!alert.read ? 'text-white' : 'text-slate-400'}`}>{alert.msg}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-mono text-slate-600">{alert.time}</span>
                    {!alert.read && <div className="w-2 h-2 bg-green-500 rounded-full" />}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Report detail modal */}
      {selectedReport && (
        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-6"
          onClick={e => { if (e.target === e.currentTarget) setSelectedReport(null); }}>
          <div className="bg-zinc-900 border border-white/10 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 shadow-2xl relative">
            <button onClick={() => setSelectedReport(null)} className="absolute top-6 right-6 p-2 hover:bg-white/10 rounded-full">
              <LucideIcon name="x" className="w-6 h-6" />
            </button>
            <div className="flex flex-col md:flex-row gap-8">
              <div className="flex-1">
                <div className="flex items-center gap-3 mb-4 flex-wrap">
                  <span className="bg-green-500 text-black px-2 py-0.5 rounded text-[10px] font-bold">GOVERNMENT INTEL</span>
                  <span className="text-slate-500 font-mono text-xs">{selectedReport.id}</span>
                  {selectedReport.violationType && (
                    <span className="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-[10px] font-bold">{selectedReport.violationType}</span>
                  )}
                </div>
                <h2 className="text-3xl font-bold mb-2 text-white">{selectedReport.topic}</h2>
                <div className="flex items-center gap-2 text-slate-400 text-sm mb-8">
                  <LucideIcon name="map-pin" className="w-4 h-4" />
                  {selectedReport.coords}{selectedReport.zone && ` • ${selectedReport.zone}`}
                </div>
                <div className="grid grid-cols-2 gap-4 mb-8">
                  {[
                    { label:'Vegetation Loss', val:selectedReport.loss,       col:'text-red-500'   },
                    { label:'Risk Score',       val:`${selectedReport.risk}%`, col:'text-red-500'   },
                    { label:'Reported By',      val:selectedReport.citizen,    col:'text-blue-400'  },
                    { label:'Date Filed',       val:selectedReport.date,       col:'text-green-400' },
                  ].map(({ label,val,col }) => (
                    <div key={label} className="p-4 bg-black/30 rounded-2xl border border-white/5">
                      <span className="text-[10px] font-mono text-slate-500 block uppercase mb-1">{label}</span>
                      <div className={`text-2xl font-bold ${col}`}>{val}</div>
                    </div>
                  ))}
                </div>
                <div className="space-y-4 mb-6">
                  <h4 className="font-bold border-b border-white/5 pb-2 text-white">Intelligence Summary</h4>
                  <p className="text-slate-400 text-sm italic">"{selectedReport.description}"</p>
                  <div className="p-4 bg-blue-500/5 border border-blue-500/20 rounded-xl text-xs text-blue-200 leading-relaxed">
                    <strong>ARANYA AI ASSESSMENT:</strong> Anomalous topographical excavation detected via ΔNDVI analysis. High-frequency heavy vehicle movement confirmed 22:00–04:00 IST. Probable violations: Forest Conservation Act §4(1), NGT OA 362/2022 Directives, Environment (Protection) Act §5.
                  </div>
                </div>
                <div className="mb-6">
                  <h4 className="text-xs font-mono text-slate-500 uppercase mb-3">Update Enforcement Status</h4>
                  <div className="flex flex-wrap gap-2">
                    {STATUSES.map(s => (
                      <button key={s} onClick={() => updateStatus(selectedReport.id, s)}
                        className="px-3 py-1.5 rounded-lg text-xs font-bold transition-all border"
                        style={{ background:selectedReport.status===s?'#22c55e':'rgba(255,255,255,0.04)', color:selectedReport.status===s?'#000':'#94a3b8', borderColor:selectedReport.status===s?'#22c55e':'rgba(255,255,255,0.08)' }}>
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex gap-4">
                  <button onClick={() => exportDossier(selectedReport)}
                    className="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-green-500 transition-colors flex items-center justify-center gap-2">
                    <LucideIcon name="download" className="w-4 h-4" /> Export Dossier
                  </button>
                  <button onClick={() => deleteReport(selectedReport.id)}
                    className="glass border border-red-500/20 py-3 px-5 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors">
                    <LucideIcon name="trash" className="w-4 h-4 text-red-400" />
                  </button>
                </div>
              </div>
              {/* Enforcement timeline */}
              <div className="w-full md:w-[280px] space-y-4">
                <div className="bg-zinc-800/50 p-4 rounded-2xl space-y-3">
                  <h4 className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Enforcement Timeline</h4>
                  {[
                    { label:'Report Received',      done:true,                                                                                   date:selectedReport.date },
                    { label:'Satellite Confirmed',   done:selectedReport.risk>40,                                                                date:'Automated' },
                    { label:'Under Review',          done:['Under Review','Under Investigation','Resolved','Closed'].includes(selectedReport.status) },
                    { label:'Investigation Started', done:['Under Investigation','Resolved','Closed'].includes(selectedReport.status) },
                    { label:'Case Resolved',         done:['Resolved','Closed'].includes(selectedReport.status) },
                  ].map((step, i) => (
                    <div key={i} className="flex items-center gap-3">
                      <div className={`w-8 h-8 rounded-full border-4 border-zinc-900 flex items-center justify-center flex-shrink-0 ${step.done ? 'bg-green-500' : 'bg-zinc-700'}`}>
                        {step.done && <LucideIcon name="check" className="w-3 h-3 text-white" />}
                      </div>
                      <div>
                        <div className={`text-sm font-bold ${step.done ? 'text-white' : 'text-slate-600'}`}>{step.label}</div>
                        {step.date && <div className="text-[10px] text-slate-500">{step.date}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── Citizen portal ── */
const CitizenPortal = ({ reports, setReports }) => {
  const notify = useNotify();
  const [tab, setTab]             = useState('report');
  const [myIds, setMyIds]         = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted]   = useState(false);
  const [expanded, setExpanded]   = useState(null);
  const [gpsLoading, setGpsLoading] = useState(false);
  const [form, setForm] = useState({ description:'', topic:'', violationType:'', zone:'', lat:'', lng:'' });

  const captureGPS = () => {
    setGpsLoading(true);
    const done = (lat, lng) => { setForm(f => ({...f, lat, lng})); setGpsLoading(false); notify('Location captured!', 'success'); };
    if (navigator.geolocation)
      navigator.geolocation.getCurrentPosition(
        p => done(p.coords.latitude.toFixed(4), p.coords.longitude.toFixed(4)),
        () => done((26.5+Math.random()*3).toFixed(4), (75.5+Math.random()*2.5).toFixed(4))
      );
    else done((26.5+Math.random()*3).toFixed(4), (75.5+Math.random()*2.5).toFixed(4));
  };

  const handleReport = e => {
    e.preventDefault();
    if (!form.description || !form.topic || !form.violationType || !form.zone) {
      notify('Please fill all required fields', 'error'); return;
    }
    setSubmitting(true);
    setTimeout(() => {
      const rep = {
        id: genId(), topic: form.topic,
        coords: form.lat && form.lng ? `${form.lat}° N, ${form.lng}° E` : '28.6139° N, 76.2090° E',
        lat: parseFloat(form.lat)||28.61, lng: parseFloat(form.lng)||76.21,
        status: 'Pending Review',
        risk: Math.floor(Math.random()*40)+30,
        loss: `${(Math.random()*10+1).toFixed(1)}%`,
        date: new Date().toISOString().split('T')[0],
        citizen: 'Anonymous Citizen',
        description: form.description, zone: form.zone, violationType: form.violationType,
      };
      setReports(p => [rep, ...p]);
      setMyIds(p => [rep.id, ...p]);
      setSubmitting(false);
      setSubmitted(true);
      setForm({ description:'', topic:'', violationType:'', zone:'', lat:'', lng:'' });
      notify('Report submitted successfully!', 'success');
      setTimeout(() => { setSubmitted(false); setTab('track'); }, 2600);
    }, 1800);
  };

  const myReports = reports.filter(r => myIds.includes(r.id));
  const stepsFor = rep => [
    { label:'Submitted',            done:true,                                                                                    date:rep.date    },
    { label:'Viewed by Authority',  done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status)                          },
    { label:'AI Analysis Complete', done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status),         date:'Automated' },
    { label:'Investigation Started',done:['Under Investigation','Resolved','Closed'].includes(rep.status)                                        },
    { label:'Resolved',             done:['Resolved','Closed'].includes(rep.status)                                                               },
  ];

  return (
    <div className="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
      <div className="max-w-4xl mx-auto">
        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
          <div>
            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Citizen Empowerment Portal</h1>
            <p className="text-slate-500 mt-1">Transparent environmental governance — backed by satellite evidence.</p>
          </div>
          <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
            {[['report','New Complaint'],['track','Track Status'],['public','All Reports']].map(([id,label]) => (
              <button key={id} onClick={() => setTab(id)}
                className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${tab===id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600'}`}>
                {label}
              </button>
            ))}
          </div>
        </header>

        <div className="grid md:grid-cols-3 gap-8">
          <div className="md:col-span-2 space-y-6">

            {tab === 'report' && (
              <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                {submitted ? (
                  <div className="text-center py-10">
                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                      <LucideIcon name="check-circle-2" className="w-8 h-8 text-green-500" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-900 mb-2">Report Submitted Successfully</h3>
                    <p className="text-slate-500 text-sm">Your report has been logged and assigned a tracking ID. Redirecting…</p>
                  </div>
                ) : (
                  <form onSubmit={handleReport} className="space-y-5">
                    <h3 className="text-xl font-bold text-slate-800">Report an Environmental Observation</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Title *</label>
                        <input required value={form.topic} onChange={e => setForm(f=>({...f,topic:e.target.value}))}
                          placeholder="E.g., Illegal tree felling"
                          className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Violation Type *</label>
                        <select required value={form.violationType} onChange={e => setForm(f=>({...f,violationType:e.target.value}))}
                          className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm outline-none cursor-pointer">
                          <option value="">Select…</option>
                          {VIOLATION_TYPES.map(v => <option key={v}>{v}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Forest Zone *</label>
                        <select required value={form.zone} onChange={e => setForm(f=>({...f,zone:e.target.value}))}
                          className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm outline-none cursor-pointer">
                          <option value="">Select zone…</option>
                          {ZONES.map(z => <option key={z}>{z}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Location (GPS)</label>
                        <div onClick={captureGPS}
                          className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl p-3 cursor-pointer hover:bg-slate-100 transition-colors">
                          <LucideIcon name="map-pin" className="w-4 h-4 text-blue-600" />
                          <span className="text-xs font-medium text-slate-400 italic">
                            {gpsLoading ? 'Detecting…' : form.lat ? `${form.lat}° N, ${form.lng}° E` : 'Tap to auto-detect GPS…'}
                          </span>
                        </div>
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Description *</label>
                      <textarea required value={form.description} onChange={e => setForm(f=>({...f,description:e.target.value}))}
                        placeholder="Describe what you're seeing — machinery, activity, timing, scale…"
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 h-36 focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none" />
                    </div>
                    <button type="submit" disabled={submitting}
                      className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                      {submitting
                        ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />Submitting…</>
                        : 'Finalize & Send Report'}
                    </button>
                  </form>
                )}
              </div>
            )}

            {tab === 'track' && (
              <div className="space-y-4">
                {myReports.length === 0 ? (
                  <div className="bg-white p-12 rounded-3xl border border-slate-200 text-center">
                    <p className="text-slate-400 text-sm mb-4">No reports submitted in this session.</p>
                    <button onClick={() => setTab('report')} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">Submit a Report</button>
                  </div>
                ) : myReports.map(rep => (
                  <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start mb-4">
                      <div>
                        <span className="text-[10px] font-mono text-slate-400">{rep.id}</span>
                        <h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3>
                        <p className="text-xs text-slate-400">{rep.zone} • {rep.date}</p>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span>
                        <button onClick={() => setExpanded(expanded===rep.id ? null : rep.id)} className="text-xs text-slate-400 hover:text-slate-600">
                          {expanded === rep.id ? 'Hide' : 'Details'}
                        </button>
                      </div>
                    </div>
                    {expanded === rep.id && (
                      <div className="relative pt-4">
                        <div className="absolute top-0 left-4 w-0.5 h-full bg-slate-100" />
                        {stepsFor(rep).map((step, idx) => (
                          <div key={idx} className="flex gap-4 mb-4 relative z-10">
                            <div className={`w-8 h-8 rounded-full border-4 border-white flex items-center justify-center flex-shrink-0 ${step.done ? 'bg-green-500' : 'bg-slate-200'}`}>
                              {step.done && <LucideIcon name="check-circle-2" className="w-4 h-4 text-white" />}
                            </div>
                            <div>
                              <div className={`text-sm font-bold ${step.done ? 'text-slate-800' : 'text-slate-400'}`}>{step.label}</div>
                              {step.date && <div className="text-[10px] text-slate-400">{step.date}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {tab === 'public' && (
              <div className="space-y-4">
                <h3 className="font-bold text-slate-800">All Reported Incidents ({reports.length})</h3>
                {reports.map(rep => (
                  <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div className="flex justify-between items-start">
                      <div>
                        <span className="text-[10px] font-mono text-slate-400">{rep.id}</span>
                        <h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3>
                        <p className="text-xs text-slate-400">{rep.zone||'—'} • {rep.violationType||'—'} • {rep.date}</p>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-bold px-2 py-1 rounded-full"
                          style={{ background:rep.risk>=75?'#fee2e2':rep.risk>=50?'#fef9c3':'#dcfce7', color:rep.risk>=75?'#b91c1c':rep.risk>=50?'#a16207':'#15803d' }}>
                          {rep.risk}% risk
                        </span>
                        <span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Sidebar */}
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-3xl border border-slate-200 space-y-4">
              <h4 className="text-sm font-bold text-slate-800">Why Transparency Matters</h4>
              <p className="text-xs text-slate-500 leading-relaxed">
                Every observation is cross-referenced with satellite imagery. Your report becomes part of the evidence chain in NGT proceedings — the same data used to suspend illegal leases in Ramalwas and Pichopa Kalan.
              </p>
              <div className="p-4 bg-slate-50 rounded-2xl flex items-center gap-3">
                <LucideIcon name="shield" className="w-8 h-8 text-blue-600" />
                <div className="text-xs text-slate-700 font-medium">Qualifies as Official Evidence</div>
              </div>
            </div>
            <div className="bg-slate-900 p-6 rounded-3xl text-white space-y-4 shadow-xl">
              <h4 className="text-sm font-bold">Community Impact</h4>
              <div className="flex items-center gap-4">
                <div className="text-3xl font-black text-green-500">{reports.filter(r=>['Resolved','Closed'].includes(r.status)).length||0}</div>
                <div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Cases Resolved<br/>This Quarter</div>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-3xl font-black text-blue-400">{reports.length}</div>
                <div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Total Reports<br/>Filed</div>
              </div>
              <div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                <div className="bg-green-500 h-full transition-all duration-700"
                  style={{ width:`${reports.length>0?Math.round(reports.filter(r=>['Resolved','Closed'].includes(r.status)).length/reports.length*100):0}%` }} />
              </div>
              <p className="text-[10px] text-slate-600 font-mono">RESOLUTION RATE</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Root App ── */
const App = () => {
  const [view, setView]       = useState('simulation');
  const [userRole, setUserRole] = useState(null);
  const [reports, setReports] = useState(INITIAL_REPORTS);

  const handleLogin  = role => { setUserRole(role); setView(role); };
  const handleLogout = ()   => { setUserRole(null); setView('simulation'); };

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view]);

  return (
    <NotificationProvider>
      <Navigation setView={setView} userRole={userRole} onLogout={handleLogout} />
      {view === 'simulation' && <SimulationScreen onComplete={() => setView('login')} />}
      {view === 'login'      && <LoginScreen onLogin={handleLogin} />}
      {view === 'gov'        && <GovDashboard reports={reports} setReports={setReports} onLogout={handleLogout} />}
      {view === 'citizen'    && <CitizenPortal reports={reports} setReports={setReports} onLogout={handleLogout} />}
    </NotificationProvider>
  );
};

ReactDOM.createRoot(document.getElementById('react-root')).render(<App />);
</script>
</body>
</html>
