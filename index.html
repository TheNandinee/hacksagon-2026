<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARANYA | Autonomous Real-time Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #ffffff;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Premium Vignette */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(10, 14, 39, 0.4) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Subtle Grain */
        #grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='2' /%3E%3C/filter%3E%3Crect width='400' height='400' fill='%23ffffff' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            z-index: 3;
            pointer-events: none;
            opacity: 0.5;
        }

        #scroll-content {
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .scroll-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .content-box {
            text-align: center;
            max-width: 1200px;
            padding: 60px 40px;
            opacity: 0;
            pointer-events: none;
            will-change: opacity, transform;
        }

        /* Premium Typography */
        h1.aranya-title {
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin: 0;
            text-transform: uppercase;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.3));
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(60px) scale(0.7);
            margin: 0 6px;
            will-change: opacity, transform;
        }

        .letter.active {
            animation: letterReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes letterReveal {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.7);
            }
            50% {
                transform: translateY(-15px) scale(1.15);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .subtitle {
            font-size: 0.95rem;
            letter-spacing: 0.15em;
            margin-top: 3rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            line-height: 2;
        }

        .word {
            display: inline-block;
            opacity: 0;
            margin: 0 3px;
            will-change: opacity;
        }

        .problem-text {
            font-size: 2.2rem;
            line-height: 1.8;
            font-weight: 400;
            color: #ffffff;
            max-width: 1100px;
            letter-spacing: 0.02em;
        }

        .problem-text strong {
            color: #64c8ff;
            font-weight: 600;
        }

        /* Glassmorphism Button */
        .cta-button {
            pointer-events: all;
            padding: 18px 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: inline-block;
            margin-top: 50px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.1);
        }

        .cta-button:hover {
            background: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.4);
            box-shadow: 0 8px 32px rgba(100, 200, 255, 0.3);
            transform: translateY(-2px);
        }

        #scroll-hint {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            animation: scrollPulse 2.5s infinite;
            font-weight: 500;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(8px); }
        }

        #data-marker {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }

        .marker-ring {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(100, 200, 255, 0.6);
            border-radius: 50%;
            animation: pulseRing 2s infinite;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.4);
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .marker-dot {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #64c8ff, #2a8fb8);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.8);
        }

        .spacer {
            height: 100vh;
        }

        /* Smooth scrolling container */
        #scroll-content {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="vignette"></div>
    <div id="grain"></div>
    <div id="data-marker">
        <div class="marker-ring"></div>
        <div class="marker-dot"></div>
    </div>
    <div id="scroll-hint">↓ Scroll to explore ↓</div>

    <div id="scroll-content">
        <!-- Scene 1: The Hook -->
        <div class="scroll-section" id="scene1"></div>

        <!-- Scene 2: The Zoom -->
        <div class="scroll-section" id="scene2"></div>

        <!-- Scene 3: The Reveal -->
        <div class="scroll-section" id="scene3">
            <div class="content-box" id="reveal-box">
                <h1 class="aranya-title">
                    <span class="letter">A</span><span class="letter">R</span><span class="letter">A</span><span class="letter">N</span><span class="letter">Y</span><span class="letter">A</span>
                </h1>
                <div class="subtitle">
                    <span class="word">Autonomous</span>
                    <span class="word">·</span>
                    <span class="word">Real-time</span>
                    <span class="word">·</span>
                    <span class="word">Analytics</span>
                    <span class="word">·</span>
                    <span class="word">for</span>
                    <span class="word">·</span>
                    <span class="word">Natural</span>
                    <span class="word">·</span>
                    <span class="word">Yield</span>
                    <span class="word">·</span>
                    <span class="word">Area</span>
                    <span class="word">·</span>
                    <span class="word">Protection</span>
                </div>
            </div>
        </div>

        <!-- Scene 4: The Problem Statement -->
        <div class="scroll-section" id="scene4">
            <div class="content-box" id="problem-box">
                <p class="problem-text">
                    "The Aravali hills — <strong>2 billion years old</strong> — are disappearing.<br>
                    We built a system to <strong>catch who's doing it.</strong>"
                </p>
            </div>
        </div>

        <!-- Scene 5: The CTA -->
        <div class="scroll-section" id="scene5">
            <div class="content-box" id="cta-box">
                <h2 style="font-size: 2.5rem; font-weight: 600; margin-bottom: 30px; letter-spacing: 0.05em;">Protect the Aravali</h2>
                <a href="http://localhost:8501" target="_blank" rel="noopener noreferrer" class="cta-button">→ Enter ARANYA ←</a>
            </div>
        </div>

        <!-- Extra spacer for scroll room -->
        <div class="spacer"></div>
        <div class="spacer"></div>
    </div>

    <script>
        // ==================== THREE.JS SETUP ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x0a0e27, 1);
        container.appendChild(renderer.domElement);

        // ==================== CUSTOM ATMOSPHERE SHADER ====================
        const atmosphereVertexShader = `
            varying vec3 vertexNormal;
            varying vec3 vertexPosition;
            void main() {
                vertexNormal = normalize(normalMatrix * normal);
                vertexPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const atmosphereFragmentShader = `
            varying vec3 vertexNormal;
            varying vec3 vertexPosition;
            uniform vec3 lightDir;
            void main() {
                vec3 normal = normalize(vertexNormal);
                float fresnel = pow(1.0 - abs(dot(normal, lightDir)), 3.0);
                vec3 glowColor = mix(vec3(0.4, 0.8, 1.0), vec3(0.2, 0.6, 0.8), fresnel);
                gl_FragColor = vec4(glowColor, fresnel * 0.5);
            }
        `;

        // ==================== TEXTURES ====================
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormal = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // ==================== EARTH GROUP ====================
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Earth Sphere
        const earthGeo = new THREE.SphereGeometry(1, 256, 256);
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTexture,
            normalMap: earthNormal,
            specularMap: earthSpecular,
            specular: new THREE.Color(0x222222),
            shininess: 35,
            emissive: new THREE.Color(0x0a0a0a)
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        // Clouds
        const cloudGeo = new THREE.SphereGeometry(1.02, 256, 256);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: cloudsTexture,
            transparent: true,
            opacity: 0.5,
            emissive: new THREE.Color(0x050505)
        });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        earthGroup.add(cloudMesh);

        // Atmosphere Layer 1 (Inner glow - Cyan)
        const atmos1Geo = new THREE.SphereGeometry(1.03, 256, 256);
        const atmos1Mat = new THREE.MeshBasicMaterial({
            color: 0x64c8ff,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const atmos1Mesh = new THREE.Mesh(atmos1Geo, atmos1Mat);
        earthGroup.add(atmos1Mesh);

        // Atmosphere Layer 2 (Middle - Blue)
        const atmos2Geo = new THREE.SphereGeometry(1.08, 256, 256);
        const atmos2Mat = new THREE.MeshBasicMaterial({
            color: 0x2a5f8f,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const atmos2Mesh = new THREE.Mesh(atmos2Geo, atmos2Mat);
        earthGroup.add(atmos2Mesh);

        // Atmosphere Layer 3 (Outer - Deep Blue)
        const atmos3Geo = new THREE.SphereGeometry(1.15, 256, 256);
        const atmos3Mat = new THREE.MeshBasicMaterial({
            color: 0x1a3a52,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const atmos3Mesh = new THREE.Mesh(atmos3Geo, atmos3Mat);
        earthGroup.add(atmos3Mesh);

        // ==================== PREMIUM STARFIELD ====================
        function createPremiumStars(count, size, range, color, opacity) {
            const geo = new THREE.BufferGeometry();
            const coords = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                coords[i] = (Math.random() - 0.5) * range;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            const mat = new THREE.PointsMaterial({ 
                color: color,
                size: size, 
                transparent: true, 
                opacity: opacity,
                sizeAttenuation: true
            });
            return new THREE.Points(geo, mat);
        }

        const starField1 = createPremiumStars(4000, 0.06, 200, 0xffffff, 0.7);
        const starField2 = createPremiumStars(2000, 0.1, 300, 0x64c8ff, 0.4);
        const starField3 = createPremiumStars(1000, 0.15, 400, 0x2a8fb8, 0.3);
        scene.add(starField1);
        scene.add(starField2);
        scene.add(starField3);

        // ==================== PREMIUM LIGHTING ====================
        const ambientLight = new THREE.AmbientLight(0x505060, 2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        sunLight.position.set(10, 5, 10);
        scene.add(sunLight);

        // Rim light (Cyan)
        const rimLight = new THREE.DirectionalLight(0x64c8ff, 1.2);
        rimLight.position.set(-8, -3, -10);
        scene.add(rimLight);

        // ==================== CAMERA SETUP ====================
        camera.position.z = 5;
        earthGroup.rotation.y = -Math.PI / 2.5;
        earthGroup.rotation.x = 0.3;

        // ==================== ANIMATION LOOP ====================
        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.00008;
            cloudMesh.rotation.y += 0.0001;
            starField1.rotation.y += 0.00003;
            starField2.rotation.y += 0.00002;
            starField3.rotation.y += 0.00001;
            renderer.render(scene, camera);
        }
        animate();

        // ==================== GSAP SCROLL ANIMATIONS WITH PINNING ====================
        gsap.registerPlugin(ScrollTrigger);

        // Create a master timeline that pins the screen
        const masterTL = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5,
                markers: false
            }
        });

        // ===== STAGE 1: Initial zoom to India =====
        masterTL.to(camera.position, {
            z: 1.3,
            ease: "power2.inOut",
            duration: 1.2
        }, 0);

        masterTL.to(earthGroup.rotation, {
            y: Math.PI * 0.42,
            x: 0.5,
            ease: "power2.inOut",
            duration: 1.2
        }, 0);

        // Atmosphere intensifies
        masterTL.to([atmos1Mat, atmos2Mat, atmos3Mat], {
            opacity: (i) => [0.18, 0.22, 0.12][i],
            duration: 0.8
        }, 0.2);

        // ===== STAGE 2: Deep zoom to Aravali =====
        masterTL.to(camera.position, {
            z: 0.45,
            ease: "power2.inOut",
            duration: 1.2
        }, 0.6);

        // Show data marker
        masterTL.to("#data-marker", {
            opacity: 1,
            duration: 0.6
        }, 0.8);

        // ===== STAGE 3: Reveal ARANYA letters =====
        masterTL.to("#reveal-box", {
            opacity: 1,
            duration: 0.4
        }, 1.0);

        const letters = document.querySelectorAll('.letter');
        letters.forEach((letter, i) => {
            const delay = 1.3 + (i * 0.18);
            masterTL.call(() => {
                letter.classList.add('active');
            }, [], delay);
        });

        // Subtitle words fade in
        const words = document.querySelectorAll('.word');
        words.forEach((word, i) => {
            masterTL.to(word, {
                opacity: 1,
                duration: 0.12
            }, 2.4 + (i * 0.05));
        });

        // ===== STAGE 4: Problem statement =====
        masterTL.to("#reveal-box", {
            opacity: 0,
            y: -120,
            filter: "blur(20px)",
            duration: 0.6
        }, 2.8);

        masterTL.to("#data-marker", {
            opacity: 0,
            duration: 0.4
        }, 2.8);

        masterTL.to("#problem-box", {
            opacity: 1,
            duration: 0.6
        }, 3.2);

        // Camera slight pullback
        masterTL.to(camera.position, {
            z: 0.65,
            ease: "power2.inOut",
            duration: 0.8
        }, 2.8);

        // ===== STAGE 5: CTA Button =====
        masterTL.to("#problem-box", {
            opacity: 0,
            y: -100,
            filter: "blur(15px)",
            duration: 0.6
        }, 3.8);

        masterTL.to("#cta-box", {
            opacity: 1,
            y: 0,
            duration: 0.6
        }, 4.2);

        masterTL.to(camera.position, {
            z: 0.35,
            ease: "power2.inOut",
            duration: 0.8
        }, 4.2);

        // ==================== HANDLE RESIZE ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            ScrollTrigger.refresh();
        });

    </script>
</body>
</html>
