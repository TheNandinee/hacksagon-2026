<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARANYA | Autonomous Real-time Analytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            scroll-behavior: smooth;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        #scroll-content {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .scroll-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .content-box {
            text-align: center;
            max-width: 900px;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .content-box.active {
            pointer-events: all;
        }

        h1.aranya-title {
            font-size: 6rem;
            letter-spacing: 2rem;
            margin: 0;
            font-weight: 200;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            margin: 0 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            letter-spacing: 0.4rem;
            margin-top: 2.5rem;
            font-weight: 300;
            color: #999;
            text-transform: uppercase;
            line-height: 1.8;
        }

        .word {
            display: inline-block;
            opacity: 0;
            margin: 0 6px;
        }

        .problem-text {
            font-size: 2rem;
            line-height: 1.8;
            font-weight: 300;
            font-style: italic;
            color: #fff;
            max-width: 1000px;
        }

        .cta-button {
            pointer-events: all;
            padding: 18px 50px;
            font-size: 1.3rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .cta-button:hover {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        #scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(5px); }
        }

        #india-highlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .spacer {
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="india-highlight"></div>
    <div id="scroll-hint">Scroll to explore</div>

    <div id="scroll-content">
        <!-- Scene 1: The Hook -->
        <div class="scroll-section" id="scene1"></div>

        <!-- Scene 2: The Zoom -->
        <div class="scroll-section" id="scene2"></div>

        <!-- Scene 3: The Reveal -->
        <div class="scroll-section" id="scene3">
            <div class="content-box" id="reveal-box">
                <h1 class="aranya-title">
                    <span class="letter">A</span>
                    <span class="letter">R</span>
                    <span class="letter">A</span>
                    <span class="letter">N</span>
                    <span class="letter">Y</span>
                    <span class="letter">A</span>
                </h1>
                <div class="subtitle">
                    <span class="word">Autonomous</span>
                    <span class="word">·</span>
                    <span class="word">Real-time</span>
                    <span class="word">·</span>
                    <span class="word">Analytics</span>
                    <span class="word">·</span>
                    <span class="word">for</span>
                    <span class="word">·</span>
                    <span class="word">Natural</span>
                    <span class="word">·</span>
                    <span class="word">Yield</span>
                    <span class="word">·</span>
                    <span class="word">Area</span>
                    <span class="word">·</span>
                    <span class="word">Protection</span>
                </div>
            </div>
        </div>

        <!-- Scene 4: The Problem Statement -->
        <div class="scroll-section" id="scene4">
            <div class="content-box" id="problem-box">
                <p class="problem-text">
                    "The Aravali hills — 2 billion years old — are disappearing.<br>
                    We built a system to catch who's doing it."
                </p>
            </div>
        </div>

        <!-- Scene 5: The CTA -->
        <div class="scroll-section" id="scene5">
            <div class="content-box" id="cta-box">
                <h2 style="font-size: 2.5rem; font-weight: 300; margin-bottom: 20px;">Ready to protect the Aravali?</h2>
                <a href="http://localhost:8501" class="cta-button">Enter ARANYA &rarr;</a>
            </div>
        </div>

        <!-- Extra spacer for scroll room -->
        <div class="spacer"></div>
    </div>

    <script>
        // ==================== THREE.JS SETUP ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        // ==================== TEXTURES ====================
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
        const earthNormal = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
        const earthSpecular = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const cloudsTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png');

        // ==================== EARTH GROUP ====================
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // Earth Sphere
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            map: earthTexture,
            normalMap: earthNormal,
            specularMap: earthSpecular,
            specular: new THREE.Color('grey'),
            shininess: 5
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);

        // Clouds Sphere
        const cloudGeo = new THREE.SphereGeometry(1.015, 64, 64);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: cloudsTexture,
            transparent: true,
            opacity: 0.7
        });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        earthGroup.add(cloudMesh);

        // Atmosphere Glow (Inner)
        const atmosGeo = new THREE.SphereGeometry(1.02, 64, 64);
        const atmosMat = new THREE.MeshBasicMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.25,
            side: THREE.BackSide
        });
        const atmosMesh = new THREE.Mesh(atmosGeo, atmosMat);
        earthGroup.add(atmosMesh);

        // Atmosphere Glow (Outer)
        const outerAtmosGeo = new THREE.SphereGeometry(1.1, 64, 64);
        const outerAtmosMat = new THREE.MeshBasicMaterial({
            color: 0x2244aa,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const outerAtmosMesh = new THREE.Mesh(outerAtmosGeo, outerAtmosMat);
        earthGroup.add(outerAtmosMesh);

        // ==================== STARS ====================
        function createStarField(count, size, range) {
            const geo = new THREE.BufferGeometry();
            const coords = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                coords[i] = (Math.random() - 0.5) * range;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            const mat = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: size, 
                transparent: true, 
                opacity: 0.8,
                sizeAttenuation: true
            });
            return new THREE.Points(geo, mat);
        }

        const starField1 = createStarField(2000, 0.04, 120);
        const starField2 = createStarField(1000, 0.08, 200);
        scene.add(starField1);
        scene.add(starField2);

        // ==================== LIGHTING ====================
        const ambientLight = new THREE.AmbientLight(0x505050, 2.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // ==================== CAMERA INITIAL STATE ====================
        camera.position.z = 5;
        earthGroup.rotation.y = -Math.PI / 2.5;
        earthGroup.rotation.x = 0.3;

        // ==================== ANIMATION LOOP ====================
        function animate() {
            requestAnimationFrame(animate);
            earthGroup.rotation.y += 0.0002;
            cloudMesh.rotation.y += 0.0003;
            starField1.rotation.y += 0.00008;
            starField2.rotation.y += 0.00004;
            renderer.render(scene, camera);
        }
        animate();

        // ==================== GSAP SCROLL ANIMATIONS ====================
        gsap.registerPlugin(ScrollTrigger);

        // Create master timeline
        const masterTL = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 2,
                markers: false
            }
        });

        // SCENE 1-2: The Zoom (Camera pulls in, Earth rotates to India)
        masterTL.to(camera.position, {
            z: 0.8,
            ease: "power2.inOut",
            duration: 1
        }, 0);

        masterTL.to(earthGroup.rotation, {
            y: Math.PI * 0.42,
            x: 0.5,
            ease: "power2.inOut",
            duration: 1
        }, 0);

        masterTL.to("#india-highlight", {
            opacity: 0.6,
            duration: 0.6
        }, 0.2);

        // SCENE 3: The Reveal (Letters drop with pulse)
        masterTL.to("#reveal-box", {
            opacity: 1,
            duration: 0.3
        }, 0.5);

        const letters = document.querySelectorAll('.letter');
        letters.forEach((letter, i) => {
            masterTL.to(letter, {
                opacity: 1,
                y: 0,
                scale: 1.3,
                duration: 0.12,
                ease: "back.out"
            }, 0.6 + (i * 0.1));

            masterTL.to(letter, {
                scale: 1,
                duration: 0.1
            }, 0.72 + (i * 0.1));
        });

        const words = document.querySelectorAll('.word');
        words.forEach((word, i) => {
            masterTL.to(word, {
                opacity: 1,
                duration: 0.08
            }, 1.3 + (i * 0.04));
        });

        // SCENE 4: Problem Statement
        masterTL.to("#reveal-box", {
            opacity: 0,
            y: -80,
            filter: "blur(10px)",
            duration: 0.4
        }, 1.8);

        masterTL.to("#problem-box", {
            opacity: 1,
            duration: 0.5
        }, 2.1);

        // Camera continues zoom
        masterTL.to(camera.position, {
            z: 0.6,
            ease: "power2.inOut",
            duration: 1
        }, 1.8);

        // SCENE 5: CTA Button
        masterTL.to("#problem-box", {
            opacity: 0,
            y: -60,
            filter: "blur(8px)",
            duration: 0.4
        }, 2.6);

        masterTL.to("#cta-box", {
            opacity: 1,
            y: 0,
            duration: 0.5
        }, 2.9);

        // Final camera position
        masterTL.to(camera.position, {
            z: 0.5,
            ease: "power2.inOut",
            duration: 0.8
        }, 2.9);

        // ==================== HANDLE RESIZE ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            ScrollTrigger.refresh();
        });

    </script>
</body>
</html>
